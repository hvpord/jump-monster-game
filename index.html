                ['E4',0.75],['G4',0.25],['C5',0.5],['D5',0.5],
                ['E5',1],['D5',0.5],['C5',0.5],
                ['B4',0.75],['C5',0.25],['D5',0.5],['E5',0.5],
                ['D5',1.5],['-',0.5],
                ['C5',0.5],['E5',0.5],['G5',0.5],['E5',0.5],
                ['D5',0.5],['C5',0.5],['B4',0.5],['G4',0.5],
                ['C5',1],['E5',1],['C5',1.5],['-',0.5],
            ];
            const allNotes = [...mA, ...mB, ...mA2];
            let t = 0;
            for (const [note, beats] of allNotes) {
                const freq = bgmNoteToFreq(note);
                const dur = beats * beat * 0.95;
                bgmPlayOsc('square', freq, dur, startTime + t * beat, 0.07);
                t += beats;
            }
        }

        function bgmScheduleBass(startTime, bpm) {
            const beat = 60 / bpm;
            const notes = [
                ['C3',2],['G2',2],['A2',2],['E2',2],
                ['F2',2],['C3',2],['G2',1.5],['G2',0.5],
                ['C3',2],['G2',2],['A2',2],['E2',2],
                ['F2',2],['C3',2],['G2',1.5],['G2',0.5],
                ['F2',2],['C3',2],['G2',2],['A2',2],
                ['F2',2],['G2',2],['C3',2],['C3',2],
                ['C3',2],['G2',2],['A2',2],['E2',2],
                ['F2',2],['C3',2],['G2',1.5],['G2',0.5],
            ];
            let t = 0;
            for (const [note, beats] of notes) {
                const freq = bgmNoteToFreq(note);
                const dur = beats * beat * 0.98;
                bgmPlayOsc('triangle', freq, dur, startTime + t * beat, 0.1);
                t += beats;
            }
        }

        function bgmScheduleDrums(startTime, bpm) {
            const beat = 60 / bpm;
            for (let i = 0; i < 96; i++) {
                const t = startTime + i * beat;
                if (i % 4 === 0) bgmPlayDrum('kick', t, beat * 0.12);
                if (i % 4 === 1 || i % 4 === 3) bgmPlayDrum('snare', t, beat * 0.1);
                if (i % 2 === 1) bgmPlayDrum('hihat', t, beat * 0.06);
            }
        }

        function bgmSchedulePad(startTime, bpm) {
            const beat = 60 / bpm;
            const chords = [
                ['C3','E3','G3'],['G2','B2','D3'],
                ['A2','C3','E3'],['E2','G2','B2'],
                ['F2','A2','C3'],['C3','E3','G3'],
                ['G2','B2','D3'],['G2','B2','D3'],
            ];
            const repeat = [...chords,...chords,...chords,...chords];
            let t = 0;
            for (const chord of repeat) {
                const dur = 4 * beat * 0.98;
                for (const nn of chord) {
                    bgmPlayOsc('sawtooth', bgmNoteToFreq(nn), dur, startTime + t * beat, 0.015, Math.random()*5-2.5);
                }
                t += 4;
            }
        }

        function bgmStopAll() {
            if (bgmTimer) { clearTimeout(bgmTimer); bgmTimer = null; }
            for (const node of bgmScheduledNodes) {
                try {
                    if (node.osc) { node.osc.stop(); node.osc.disconnect(); }
                    if (node.source) { node.source.stop(); node.source.disconnect(); }
                    if (node.gain) node.gain.disconnect();
                } catch(e) {}
            }
            bgmScheduledNodes = [];
            bgmIsPlaying = false;
        }

        function getBgmBPM() {
            const level = Math.floor(score / 10);
            return Math.min(130 + level * 3, 175);
        }

        function startBGM() {
            if (!bgmEnabled) return;
            bgmStopAll();
            if (!bgmAudioCtx) bgmAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (bgmAudioCtx.state === 'suspended') bgmAudioCtx.resume();
            bgmIsPlaying = true;
            bgmActive = true;
            const bpm = getBgmBPM();
            const now = bgmAudioCtx.currentTime;
            bgmScheduleMelody(now + 0.1, bpm);
            bgmScheduleBass(now + 0.1, bpm);
            bgmScheduleDrums(now + 0.1, bpm);
            bgmSchedulePad(now + 0.1, bpm);
            const totalDuration = (24 * 4 / bpm) * 60 + 0.5;
            bgmTimer = setTimeout(() => {
                if (bgmIsPlaying && bgmActive) startBGM();
            }, totalDuration * 1000 - 200);
        }

        function stopBGM() {
            bgmActive = false;
            bgmStopAll();
        }

        function toggleBGM() {
            if (bgmActive) {
                stopBGM();
                bgmEnabled = false;
                document.getElementById('musicBtn').classList.add('muted');
            } else {
                bgmEnabled = true;
                document.getElementById('musicBtn').classList.remove('muted');
                if (gameState === 'playing') startBGM();
            }
        }

        // ===== 事件监听 =====
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();

                if (gameState === 'start') {
                    startGame();
                } else if (gameState === 'playing') {
                    jump();
                } else if (gameState === 'gameover') {
                    startGame();
                }
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameState === 'playing') {
                jump();
            } else if (gameState === 'start' || gameState === 'gameover') {
                startGame();
            }
        });

        canvas.addEventListener('mousedown', (e) => {
            if (gameState === 'playing') {
                jump();
            }
        });

        startBtn.addEventListener('click', startGame);
       restartBtn.addEventListener('click', startGame);
        document.getElementById('musicBtn').addEventListener('click', toggleBGM);

        // ===== 初始化 =====
        loadHighScore();
        initBackground();
        drawBackground();
        drawPlayer();

        console.log('🎮 跳怪兽小游戏已加载！按空格键开始游戏');
    </script>
</body>
