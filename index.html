<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跳怪兽小游戏</title>
    <style>
        /* ===== 全局样式重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }

        /* ===== 游戏容器 ===== */
        #gameContainer {
            position: relative;
            width: 800px;
            height: 400px;
            background: linear-gradient(to bottom, #0f3460 0%, #16213e 60%, #1a1a2e 100%);
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 150, 255, 0.3);
            overflow: hidden;
        }

        @supports (aspect-ratio: 2 / 1) {
            #gameContainer {
                width: min(100vw, 200dvh, 800px);
                height: auto;
                aspect-ratio: 2 / 1;
            }
        }

        /* ===== 游戏画布 ===== */
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        /* ===== 开始界面 ===== */
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(15, 52, 96, 0.95);
           z-index: 10;
           transition: opacity 0.5s;
            overflow-y: auto;
            padding: 12px 0;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }

       #startScreen h1 {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(8px, 2vw, 16px);
            font-size: clamp(28px, 7vw, 48px);
            color: #e94560;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
            margin-bottom: clamp(10px, 3vh, 20px);
           animation: pulse 2s ease-in-out infinite;
        }
        .title-avatar {
            width: clamp(32px, 7vw, 52px);
            height: clamp(32px, 7vw, 52px);
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.2);
            flex-shrink: 0;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        #startScreen .subtitle {
            font-size: clamp(14px, 3vw, 18px);
            color: #a0a0a0;
           margin-bottom: clamp(15px, 4vh, 40px);
            margin-bottom: clamp(10px, 2vh, 20px);
        }

        #startScreen .instructions {
            font-size: clamp(12px, 2.5vw, 15px);
            color: #e0e0e0;
            margin-bottom: clamp(15px, 4vh, 40px);
            text-align: center;
            line-height: 1.7;
        }

        #startScreen .instructions span {
            color: #e94560;
            font-weight: bold;
        }

        #startBtn {
            padding: clamp(10px, 2vh, 15px) clamp(30px, 8vw, 50px);
            font-size: clamp(16px, 4vw, 24px);
            color: #fff;
            background: #e94560;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.4);
        }

        #startBtn:hover {
            background: #ff6b6b;
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.6);
        }

        #startScreen .version {
            position: absolute;
            bottom: clamp(8px, 2vh, 15px);
            right: clamp(10px, 2.5vw, 20px);
            font-size: clamp(12px, 2.5vw, 14px);
            color: #a0a0a0;
        }

        /* ===== 结束界面 ===== */
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(15, 52, 96, 0.95);
           z-index: 10;
            overflow-y: auto;
            padding: 12px 0;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }

        #gameOverScreen h2 {
            font-size: clamp(26px, 6vw, 42px);
            color: #e94560;
            margin-bottom: clamp(10px, 3vh, 20px);
        }

        #gameOverScreen .finalScore {
            font-size: clamp(22px, 5vw, 36px);
            color: #ffd700;
            margin-bottom: clamp(6px, 2vh, 10px);
        }

        #gameOverScreen .highScore {
            font-size: clamp(14px, 3vw, 20px);
            color: #a0a0a0;
            margin-bottom: clamp(20px, 5vh, 40px);
        }

        #restartBtn {
            padding: clamp(10px, 2vh, 15px) clamp(30px, 8vw, 50px);
            font-size: clamp(16px, 4vw, 24px);
            color: #fff;
            background: #e94560;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.4);
        }

        #restartBtn:hover {
            background: #ff6b6b;
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.6);
        }

        /* ===== 分数显示 ===== */
        #scoreDisplay {
            position: absolute;
            top: clamp(8px, 2vh, 15px);
            right: clamp(10px, 2.5vw, 20px);
            font-size: clamp(16px, 4vw, 24px);
            color: #ffd700;
            font-weight: bold;
            z-index: 5;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        /* ===== 速度显示 ===== */
        #speedDisplay {
            position: absolute;
            top: clamp(36px, 6vh, 48px);
            right: clamp(10px, 2.5vw, 20px);
            font-size: clamp(12px, 3vw, 18px);
            color: #fff;
            font-weight: bold;
            z-index: 5;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
        }

        /* ===== 道具状态显示 ===== */
        #powerupDisplay {
            position: absolute;
            top: clamp(8px, 2vh, 15px);
            left: clamp(10px, 2.5vw, 20px);
            display: flex;
            flex-direction: column;
            gap: clamp(4px, 1vh, 6px);
            z-index: 5;
            font-size: clamp(12px, 2.5vw, 14px);
            color: #fff;
            text-shadow: 0 0 6px rgba(0, 0, 0, 0.7);
            pointer-events: none;
        }

        .powerup-tag {
            background: rgba(0, 0, 0, 0.4);
            padding: 4px 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .powerup-tag.hammer { color: #bdc3c7; }
        .powerup-tag.wings { color: #87ceeb; }
        .powerup-tag.shield { color: #3498db; }

        /* ===== 隐藏类 ===== */
        .hidden {
            opacity: 0;
            pointer-events: none;
        }
        /* ===== 音乐按钮 ===== */
        .music-btn {
           position: absolute;
            top: clamp(8px, 2vh, 15px);
            right: clamp(70px, 12vw, 110px);
            z-index: 5;
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            color: #888;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            user-select: none;
            -webkit-user-select: none;
        }
        .music-btn:hover {
            border-color: rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.15);
            color: #bbb;
        }
        .music-btn.on {
            border-color: #e94560;
            background: rgba(233,69,96,0.25);
            color: #fff;
            box-shadow: 0 0 15px rgba(233,69,96,0.3);
        }
        .music-btn.on:hover {
            border-color: #ff6b6b;
            background: rgba(233,69,96,0.4);
            color: #fff;
            box-shadow: 0 0 20px rgba(233,69,96,0.5);
        }
        /* ===== 网页全屏按钮 ===== */
        .fullscreen-btn {
            position: absolute;
            top: clamp(8px, 2vh, 15px);
            right: clamp(120px, 18vw, 160px);
            z-index: 11;
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            color: #888;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            user-select: none;
            -webkit-user-select: none;
        }
        .fullscreen-btn:hover {
            border-color: rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.15);
            color: #bbb;
        }
        /* ===== 网页全屏状态 ===== */
        #gameContainer.window-fullscreen {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            width: 100dvw !important;
            height: 100vh !important;
            height: 100dvh !important;
            max-width: none !important;
            border-radius: 0 !important;
            z-index: 100 !important;
            background: #000 !important;
        }
        #gameContainer.window-fullscreen #gameCanvas {
            object-fit: contain;
        }
  </style>
</head>
<body>
    <div id="gameContainer">
        <!-- 游戏画布 -->
        <canvas id="gameCanvas" width="800" height="400"></canvas>

        <!-- 分数显示 -->
        <div id="scoreDisplay">得分: 0</div>
        <div id="speedDisplay">速度: 1.0x</div>

        <!-- 道具状态显示 -->
       <div id="powerupDisplay"></div>
        <!-- 音乐控制 -->
        <button id="musicBtn" class="music-btn" title="背景音乐开关">🎵</button>
        <button id="fullscreenBtn" class="fullscreen-btn" title="网页全屏">⛶</button>

        <!-- 开始界面 -->
        <div id="startScreen">
           <h1>
                <img src="shitou.png" class="title-avatar" alt="石头">
                <span>跳怪兽</span>
                <img src="duoduo.png" class="title-avatar" alt="多多">
            </h1>
            <p class="subtitle">躲避怪兽，挑战极限！</p>
           <div class="instructions">
                点击空格或者屏幕躲避怪兽
            </div>
           <button id="startBtn">开始游戏</button>
           <div class="version">v1.7.5</div>
        </div>

        <!-- 结束界面 -->
        <div id="gameOverScreen">
            <h2>💥 游戏结束</h2>
            <div class="finalScore">最终得分: <span id="finalScore">0</span></div>
            <div class="highScore">最高得分: <span id="highScore">0</span></div>
            <button id="restartBtn">再来一次</button>
        </div>
    </div>

    <script>
        // ============================================
        // 跳怪兽小游戏 - 核心游戏逻辑
        // ============================================

        // ===== 获取DOM元素 =====
        const gameContainer = document.getElementById('gameContainer');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const speedDisplay = document.getElementById('speedDisplay');
        const powerupDisplay = document.getElementById('powerupDisplay');
        const finalScoreEl = document.getElementById('finalScore');
        const highScoreEl = document.getElementById('highScore');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        // ===== 头像素材 =====
        const shitouImg = new Image();
        const duoduoImg = new Image();
        const jeepImg = new Image();
        const footballImg = new Image();
        const camelImg = new Image();
        const sheepImg = new Image();
        const bookImg = new Image();
        const roketImg = new Image();
        const boomImg = new Image();
        shitouImg.src = 'shitou.png';
        duoduoImg.src = 'duoduo.png';
        jeepImg.src = 'jeep.png';
        footballImg.src = 'football.png';
        camelImg.src = 'camel.png';
        sheepImg.src = 'sheep.png';
        bookImg.src = 'book.png';
        roketImg.src = 'roket.png';
        boomImg.src = 'boom.png';
        let playerAvatar = null;
        let monsterAvatar = null;
        let avatarImagesReady = 0;
        [shitouImg, duoduoImg, jeepImg, footballImg, camelImg, sheepImg, bookImg, roketImg, boomImg].forEach(img => {
            img.onload = () => { avatarImagesReady++; };
        });

        // ===== 游戏常量配置 =====
        const GAME_WIDTH = 800;
        const GAME_HEIGHT = 400;
        const GROUND_Y = 320;

        const PLAYER_X = 100;
        const PLAYER_WIDTH = 42;
        const PLAYER_HEIGHT = 52;
        const JUMP_VELOCITY = -13;
        const GRAVITY = 0.6;
        const GROUND_Y_OFFSET = 5;
        const FLY_HEIGHT_OFFSET = 90;

        const MONSTER_SPEED_BASE = 4;
        const MONSTER_SPEED_INCREMENT = 0.15;
        const MONSTER_WIDTH = 38;
        const MONSTER_HEIGHT = 44;
        const BIG_MONSTER_WIDTH = 58;
        const BIG_MONSTER_HEIGHT = 64;
        const FAST_MONSTER_SPEED_MULTIPLIER = 1.6;

        const YELLOW_JUMP_TRIGGER_DISTANCE = 220;
        const YELLOW_JUMP_VELOCITY = -7.5;
        const YELLOW_JUMP_HEIGHT = (YELLOW_JUMP_VELOCITY * YELLOW_JUMP_VELOCITY) / (2 * GRAVITY);

        const MIN_GAP_BETWEEN_MONSTERS = 200;
        const BIG_MONSTER_TIMING_WINDOW = 0.7;
        const COMBO_GAP_MIN = 180;
        const COMBO_GAP_MAX = 220;
        const SPAWN_MARGIN_RIGHT = 850;
        const SAFE_ZONE_AFTER_JUMP = 120;
        const SAFE_FLYING_MONSTER_GAP = 220;

        const SPAWN_INTERVAL_MIN = 120;
        const SPAWN_INTERVAL_MAX = 240;
        const DENSITY_INCREMENT = 0.1;  // 每10分怪物密度线性增长10%

        const COLLISION_MARGIN_X = 8;
        const COLLISION_MARGIN_Y = 10;

        const ITEM_SPAWN_INTERVAL_MIN = 300;
        const ITEM_SPAWN_INTERVAL_MAX = 600;
        const FLYING_MONSTER_SPAWN_MIN = 600;
        const FLYING_MONSTER_SPAWN_MAX = 1200;
        const INVINCIBLE_DURATION = 600;
        const HAMMER_HITS = 5;           // 锤子可击飞 5 个怪兽
        const FLY_DURATION = 600;
        const SHIELD_DURATION = 1200;
        const JEEP_AMMO = 10;            // 吉普车基础可发射10发后消失
        const FOOTBALL_DRIBBLE_DURATION = 360; // 6秒
        const ROCKET_FLIGHT_DURATION = 300; // 火箭起飞到爆炸 5秒
        const ROCKET_EXPLOSION_DURATION = 60; // 爆炸效果 1秒
        const ROCKET_EASE_POWER = 1.7; // 飞行缓动指数：越大尾段越快
        const STONE_SPEED = 9;
        const DEATH_ANIMATION_DURATION = 80;

        // ===== 技能书加成后的道具数值 =====
        function getHammerDuration() { return INVINCIBLE_DURATION + player.skillBooks * 60; }
        function getHammerHits() { return HAMMER_HITS + player.skillBooks; }
        function getWingsDuration() { return FLY_DURATION + player.skillBooks * 60; }
        function getShieldDuration() { return SHIELD_DURATION + player.skillBooks * 60; }
        function getJeepAmmo() { return JEEP_AMMO + player.skillBooks; }
        function getFootballDuration() { return FOOTBALL_DRIBBLE_DURATION + player.skillBooks * 60; }

        const SCENES = [
            { id: 'grassland', name: '晴空草原' },
            { id: 'city', name: '城市街道' },
            { id: 'desert', name: '沙漠' },
            { id: 'night', name: '夜晚' },
            { id: 'railway', name: '铁路' },
            { id: 'rain', name: '大雨' }
        ];
        const SCENE_SWITCH_MIN = 15 * 60;  // 15秒（按60fps）
        const SCENE_SWITCH_MAX = 30 * 60;  // 30秒

        // ===== 游戏状态变量 =====
        let gameState = 'start';
        let score = 0;
        let highScore = 0;
        let frameCount = 0;
        let spawnTimer = 0;
        let nextSpawnTime = 0;
        let itemSpawnTimer = 0;
        let nextItemSpawnTime = 0;
        let flyingSpawnTimer = 0;
        let nextFlyingSpawnTime = 0;
        let passedMonsters = 0;
       let lastPlayerWasShitou = null;  // 用于头像角色严格轮换
        // ===== BGM 系统变量 =====
        let bgmAudioCtx = null;
        let bgmIsPlaying = false;
        let bgmScheduledNodes = [];
        let bgmTimer = null;
        let bgmBPM = 130;
        let bgmEnabled = false;
        let bgmActive = false;
        let bgmMasterGain = null;
        let bgmDrumBuffers = {};

        // ===== 场景系统 =====
        let currentScene = 'night';
        let sceneTimer = 0;
        let nextSceneTime = 0;
        let rainDrops = [];
        let lightningTimer = 0;
        let cityBuildings = [];
        let cityLaneOffset = 0;
        let desertCamelX = 0;
        let desertCacti = []; // 沙漠仙人掌数组
        let grasslandHillOffset = 0;
        let grasslandSheep = []; // 草原绵羊数组
        let trainX = -300;
        let railwayMountainOffset = 0;
        let skillBookSpawnTimer = 0;
        let nextSkillBookSpawnTime = 30 * 60 + Math.floor(Math.random() * 20 * 60); // 30-50秒

        // ===== 角色对象 =====
        const player = {
            x: PLAYER_X,
            y: GROUND_Y - PLAYER_HEIGHT + GROUND_Y_OFFSET,
            width: PLAYER_WIDTH,
            height: PLAYER_HEIGHT,
            vy: 0,
            isJumping: false,
            jumpCount: 0,
            maxJumps: 1,
            invincibleTimer: 0,
            hammerHits: 0,
            flyTimer: 0,
            shieldTimer: 0,
            jeepTimer: 0,
            jeepAmmo: 0,
            footballTimer: 0,
            footballKicked: false,
            footballPending: false,
            skillBooks: 0,
            footballX: 0,
            footballY: 0,
            footballVX: 0,
            footballVY: 0,
            isDead: false,
            deathTimer: 0,
            deathRotation: 0
        };

        // ===== 怪兽、道具、投射物数组 =====
        let monsters = [];
        let items = [];
        let projectiles = [];
        let activeRockets = []; // 火箭飞行实例数组
        let activeExplosion = null; // 爆炸效果实例
        let flyingJeep = null; // 吉普车被撞飞后的动画对象
        let droppingHammer = null; // 锤子用完掉落的动画对象

        // ===== 背景装饰 =====
        let bgStars = [];
        let clouds = [];
        let groundOffset = 0;

        // ===== 初始化背景元素 =====
        function initBackground() {
            bgStars = [];
            for (let i = 0; i < 30; i++) {
                bgStars.push({
                    x: Math.random() * GAME_WIDTH,
                    y: Math.random() * (GROUND_Y - 50),
                    size: Math.random() * 2 + 1,
                    twinkle: Math.random() * Math.PI * 2
                });
            }

            clouds = [];
            for (let i = 0; i < 5; i++) {
                clouds.push({
                    x: Math.random() * GAME_WIDTH,
                    y: Math.random() * 150 + 20,
                    width: Math.random() * 80 + 60,
                    speed: Math.random() * 0.5 + 0.2
                });
            }
        }

        // ===== 随机分配头像角色 =====
        function pickAvatars() {
            if (lastPlayerWasShitou === null) {
                lastPlayerWasShitou = Math.random() < 0.5;
            } else {
                lastPlayerWasShitou = !lastPlayerWasShitou;
            }

            if (lastPlayerWasShitou) {
                playerAvatar = shitouImg;
                monsterAvatar = duoduoImg;
            } else {
                playerAvatar = duoduoImg;
                monsterAvatar = shitouImg;
            }
        }

        function avatarLoaded(avatar) {
            return avatar && avatar.complete && avatar.naturalWidth > 0;
        }

        // ===== 音效系统（Web Audio API） =====
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playJumpSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(280, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(560, audioCtx.currentTime + 0.12);
            gain.gain.setValueAtTime(0.35, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.12);
        }

        function playKnockSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'square';
            osc.frequency.setValueAtTime(160, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.35, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        function playItemSound() {
            if (!audioCtx) return;
            [523, 659, 784].forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.value = freq;
                const t = audioCtx.currentTime + i * 0.05;
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.30, t + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
                osc.start(t);
                osc.stop(t + 0.2);
            });
        }

        function playGameOverSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(220, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(55, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function playExplosionSound() {
            if (!audioCtx) return;
            const duration = 0.6;
            const sampleRate = audioCtx.sampleRate;
            const bufferSize = Math.ceil(sampleRate * duration);
            const buffer = audioCtx.createBuffer(1, bufferSize, sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                const t = i / sampleRate;
                const envelope = Math.max(0, 1 - t / duration);
                data[i] = (Math.random() * 2 - 1) * envelope * 0.8;
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(0.8, audioCtx.currentTime);
            noiseGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            noise.connect(noiseGain);
            noiseGain.connect(audioCtx.destination);

            const osc = audioCtx.createOscillator();
            const oscGain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + duration);
            oscGain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            oscGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(oscGain);
            oscGain.connect(audioCtx.destination);

            noise.start();
            osc.start();
            noise.stop(audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        }

        // ===== 怪兽类 =====
        class Monster {
            constructor(type, x, speed) {
                this.type = type;
                this.x = x;
                this.speed = speed;
                this.passed = false;
                this.scored = false;
                this.isKnocked = false;
                this.vx = -speed;
                this.vy = 0;
                this.rotation = 0;
                this.vRotation = 0;
                this.knockEffect = 0;
                this.knockFrame = 0;
                this.stackRole = null; // 'bottom' | 'top' | null
                this.stackPartner = null;
                this.isJumping = false;

                if (type === 'big') {
                    this.width = BIG_MONSTER_WIDTH;
                    this.height = BIG_MONSTER_HEIGHT;
                } else if (type === 'yellow') {
                    this.width = 28;
                    this.height = 52;
                } else if (type === 'flying') {
                    this.width = PLAYER_WIDTH;
                    this.height = PLAYER_HEIGHT;
                } else {
                    this.width = MONSTER_WIDTH;
                    this.height = MONSTER_HEIGHT;
                }

                if (type === 'flying') {
                    this.y = GROUND_Y - PLAYER_HEIGHT - FLY_HEIGHT_OFFSET;
                } else {
                    this.y = GROUND_Y - this.height + GROUND_Y_OFFSET;
                }

                if (type === 'fast') {
                    this.vx = -speed * FAST_MONSTER_SPEED_MULTIPLIER;
                }

                this.animFrame = 0;
                this.legAngle = 0;
            }

            update() {
                if (this.isKnocked) {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy += GRAVITY;
                    this.rotation += this.vRotation;
                    this.knockFrame++;

                    // 撞右墙弹回效果
                    if (this.knockEffect === 2 && this.x + this.width > GAME_WIDTH) {
                        this.x = GAME_WIDTH - this.width;
                        this.vx = -Math.abs(this.vx) * 0.6;
                        this.vy = -6;
                        this.vRotation = -0.3;
                    }
                    return;
                }

                // 上下重叠：下面怪兽被打掉后，上面的掉下来（不会死）
                if (this.stackRole === 'top' && this.stackPartner && this.stackPartner.isKnocked) {
                    this.x += this.vx;
                    this.isJumping = true;
                    this.y += this.vy;
                    this.vy += GRAVITY;
                    const groundLevel = GROUND_Y - this.height + GROUND_Y_OFFSET;
                    if (this.y >= groundLevel) {
                        this.y = groundLevel;
                        this.vy = 0;
                        this.isJumping = false;
                        this.stackRole = null;
                        this.stackPartner = null;
                    }
                    return;
                }

                this.x += this.vx;
                this.animFrame++;
                this.legAngle = Math.sin(this.animFrame * 0.15) * 0.3;

                if (this.isJumping) {
                    this.y += this.vy;
                    this.vy += GRAVITY;
                    const groundLevel = GROUND_Y - this.height + GROUND_Y_OFFSET;
                    if (this.y >= groundLevel) {
                        this.y = groundLevel;
                        this.vy = 0;
                        this.isJumping = false;
                    }
                }
            }

            draw(ctx) {
                const centerX = this.x + this.width / 2;

                ctx.save();
                ctx.translate(centerX, this.y + this.height / 2);
                ctx.rotate(this.rotation);

                if (this.type === 'big') {
                    this.drawBigBody();
                } else if (this.type === 'yellow') {
                    this.drawYellowBody();
                } else if (this.type === 'flying') {
                    this.drawFlyingBody();
                } else {
                    this.drawNormalBody();
                }

                // 头部：头像或 fallback（放大到约两倍直径）
                let headRadius, headY;
                if (this.type === 'big') {
                    headRadius = this.width * 0.65;
                    headY = -this.height * 0.3;
                } else if (this.type === 'yellow') {
                    headRadius = this.width * 0.8;
                    headY = -this.height * 0.28;
                } else if (this.type === 'flying') {
                    headRadius = this.width * 0.6;
                    headY = -this.height * 0.25;
                } else {
                    headRadius = this.width * 0.6;
                    headY = -this.height * 0.25;
                }
                if (avatarLoaded(monsterAvatar)) {
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(0, headY, headRadius, 0, Math.PI * 2);
                    ctx.clip();
                    ctx.drawImage(monsterAvatar, -headRadius, headY - headRadius, headRadius * 2, headRadius * 2);
                    ctx.restore();
                } else {
                    ctx.fillStyle = this.type === 'big' ? '#e74c3c' : '#ff6b6b';
                    ctx.beginPath();
                    ctx.arc(0, headY, headRadius, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(-6, headY - 2, 5, 0, Math.PI * 2);
                    ctx.arc(6, headY - 2, 5, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(-6, headY - 2, 2.5, 0, Math.PI * 2);
                    ctx.arc(6, headY - 2, 2.5, 0, Math.PI * 2);
                    ctx.fill();

                    const mouthY = headY + headRadius * 0.6;
                    ctx.strokeStyle = '#2c3e50';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, mouthY, 6, 0.2, Math.PI - 0.2);
                    ctx.stroke();
                }

                // 紫色恶魔犄角（所有怪兽都有）
                this.drawHorns(headY, headRadius);

                ctx.restore();

                // 闪电怪兽：头顶闪电符号
                if (this.type === 'fast') {
                    this.drawLightning(centerX, this.y - 18);
                }
            }

            drawBigBody() {
                // 身体
                ctx.fillStyle = '#c0392b';
                ctx.beginPath();
                ctx.ellipse(0, -this.height * 0.1, this.width * 0.5, this.height * 0.4, 0, 0, Math.PI * 2);
                ctx.fill();

                // 腿
                ctx.strokeStyle = '#c0392b';
                ctx.lineWidth = 6;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(-15, this.height * 0.4);
                ctx.lineTo(-15 + Math.sin(this.legAngle) * 10, this.height * 0.5);
                ctx.moveTo(15, this.height * 0.4);
                ctx.lineTo(15 - Math.sin(this.legAngle) * 10, this.height * 0.5);
                ctx.stroke();
            }

            drawNormalBody() {
                // 身体
                ctx.fillStyle = '#e74c3c';
                ctx.beginPath();
                ctx.ellipse(0, -this.height * 0.05, this.width * 0.45, this.height * 0.35, 0, 0, Math.PI * 2);
                ctx.fill();

                // 腿
                ctx.strokeStyle = '#e74c3c';
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(-8, this.height * 0.35);
                ctx.lineTo(-8 + Math.sin(this.legAngle) * 6, this.height * 0.5);
                ctx.moveTo(8, this.height * 0.35);
                ctx.lineTo(8 - Math.sin(this.legAngle) * 6, this.height * 0.5);
                ctx.stroke();
            }

            drawYellowBody() {
                // 瘦长身体
                ctx.fillStyle = '#f39c12';
                ctx.beginPath();
                ctx.ellipse(0, -this.height * 0.08, this.width * 0.38, this.height * 0.42, 0, 0, Math.PI * 2);
                ctx.fill();

                // 两条长腿
                ctx.strokeStyle = '#f39c12';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(-6, this.height * 0.42);
                ctx.lineTo(-6 + Math.sin(this.legAngle) * 8, this.height * 0.58);
                ctx.moveTo(6, this.height * 0.42);
                ctx.lineTo(6 - Math.sin(this.legAngle) * 8, this.height * 0.58);
                ctx.stroke();
            }

            drawFlyingBody() {
                // 飞行怪兽身体（无腿）
                ctx.fillStyle = '#9b59b6';
                ctx.beginPath();
                ctx.ellipse(0, 0, this.width * 0.35, this.height * 0.25, 0, 0, Math.PI * 2);
                ctx.fill();

                // 翅膀（跟小人一样）
                ctx.fillStyle = 'rgba(135, 206, 235, 0.85)';
                const flap = Math.sin(this.animFrame * 0.4) * 8;

                ctx.beginPath();
                ctx.moveTo(-6, 0);
                ctx.quadraticCurveTo(-28, -18 + flap, -36, 6);
                ctx.quadraticCurveTo(-22, 8, -6, 4);
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(6, 0);
                ctx.quadraticCurveTo(28, -18 + flap, 36, 6);
                ctx.quadraticCurveTo(22, 8, 6, 4);
                ctx.fill();
            }

            drawHorns(headY, headRadius) {
                const hornH = headRadius * 0.55;
                const baseX = headRadius * 0.45;
                const tipX = headRadius * 0.7;
                ctx.fillStyle = '#8e44ad';
                ctx.beginPath();
                ctx.moveTo(-baseX, headY - headRadius * 0.15);
                ctx.lineTo(-tipX, headY - headRadius * 0.15 - hornH);
                ctx.lineTo(-baseX * 0.3, headY + headRadius * 0.05);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(baseX, headY - headRadius * 0.15);
                ctx.lineTo(tipX, headY - headRadius * 0.15 - hornH);
                ctx.lineTo(baseX * 0.3, headY + headRadius * 0.05);
                ctx.fill();
            }

            drawLightning(x, y) {
                ctx.save();
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.moveTo(x - 6, y - 10);
                ctx.lineTo(x + 2, y - 10);
                ctx.lineTo(x - 2, y + 2);
                ctx.lineTo(x + 6, y + 2);
                ctx.lineTo(x - 4, y + 14);
                ctx.lineTo(x, y + 2);
                ctx.lineTo(x - 8, y + 2);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }

            getHitbox() {
                return {
                    x: this.x + COLLISION_MARGIN_X,
                    y: this.y + COLLISION_MARGIN_Y,
                    width: this.width - COLLISION_MARGIN_X * 2,
                    height: this.height - COLLISION_MARGIN_Y * 2
                };
            }
        }

        // ===== 石块通用绘制（更真实的岩石） =====
        function drawRock(ctx, size) {
            ctx.save();

            // 主体：不规则多边形
            ctx.fillStyle = '#7f8c8d';
            ctx.beginPath();
            ctx.moveTo(-size * 0.85, -size * 0.25);
            ctx.lineTo(-size * 0.45, -size * 0.65);
            ctx.lineTo(size * 0.15, -size * 0.55);
            ctx.lineTo(size * 0.75, -size * 0.15);
            ctx.lineTo(size * 0.65, size * 0.35);
            ctx.lineTo(size * 0.1, size * 0.65);
            ctx.lineTo(-size * 0.55, size * 0.5);
            ctx.lineTo(-size * 0.8, size * 0.1);
            ctx.closePath();
            ctx.fill();

            // 暗部
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.beginPath();
            ctx.moveTo(size * 0.15, -size * 0.55);
            ctx.lineTo(size * 0.75, -size * 0.15);
            ctx.lineTo(size * 0.65, size * 0.35);
            ctx.lineTo(size * 0.1, size * 0.65);
            ctx.lineTo(-size * 0.55, size * 0.5);
            ctx.lineTo(-size * 0.8, size * 0.1);
            ctx.lineTo(-size * 0.55, -size * 0.1);
            ctx.lineTo(size * 0.1, -size * 0.25);
            ctx.closePath();
            ctx.fill();

            // 高光
            ctx.fillStyle = 'rgba(255,255,255,0.25)';
            ctx.beginPath();
            ctx.moveTo(-size * 0.55, -size * 0.15);
            ctx.lineTo(-size * 0.35, -size * 0.4);
            ctx.lineTo(size * 0.05, -size * 0.35);
            ctx.lineTo(size * 0.25, -size * 0.1);
            ctx.lineTo(-size * 0.1, -size * 0.05);
            ctx.closePath();
            ctx.fill();

            // 裂纹
            ctx.strokeStyle = 'rgba(0,0,0,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(size * 0.05, size * 0.15);
            ctx.lineTo(-size * 0.15, size * 0.05);
            ctx.lineTo(-size * 0.05, -size * 0.15);
            ctx.stroke();

            ctx.restore();
        }

        // ===== 道具类 =====
        class Item {
            constructor(type, x) {
                this.type = type;
                this.x = x;
                if (type === 'jeep') {
                    this.width = 72;
                    this.height = 52;
                } else if (type === 'football') {
                    this.width = 56;
                    this.height = 56;
                } else if (type === 'rocket') {
                    this.width = 40;
                    this.height = 70;
                } else {
                    this.width = 32;
                    this.height = 32;
                }
                this.y = GROUND_Y - this.height + GROUND_Y_OFFSET;
                this.collected = false;
                this.bobOffset = Math.random() * Math.PI * 2;
            }

            update() {
                this.x -= getCurrentMonsterSpeed();
            }

            draw(ctx) {
                const bobY = Math.sin(frameCount * 0.1 + this.bobOffset) * 4;
                const cx = this.x + this.width / 2;
                const cy = this.y + this.height / 2 + bobY;

                ctx.save();
                if (this.type === 'hammer') {
                    this.drawHammer(cx, cy);
                } else if (this.type === 'wings') {
                    this.drawWings(cx, cy);
                } else if (this.type === 'stone') {
                    this.drawStone(cx, cy);
                } else if (this.type === 'shield') {
                    this.drawShield(cx, cy);
                } else if (this.type === 'jeep') {
                    this.drawJeep(cx, cy);
                } else if (this.type === 'football') {
                    this.drawFootball(cx, cy);
                } else if (this.type === 'skillbook') {
                    this.drawSkillBook(cx, cy);
                } else if (this.type === 'rocket') {
                    this.drawRocket(cx, cy);
                }
                ctx.restore();
            }

            drawHammer(cx, cy) {
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(Math.sin(frameCount * 0.15) * 0.3);

                // 锤柄
                ctx.fillStyle = '#8b4513';
                ctx.beginPath();
                ctx.roundRect(-3, -18, 6, 32, 2);
                ctx.fill();

                // 锤头
                ctx.fillStyle = '#7f8c8d';
                ctx.beginPath();
                ctx.roundRect(-12, -28, 24, 12, 3);
                ctx.fill();

                // 锤头高光
                ctx.fillStyle = '#95a5a6';
                ctx.beginPath();
                ctx.roundRect(-10, -26, 6, 4, 1);
                ctx.fill();

                ctx.restore();
            }

            drawWings(cx, cy) {
                ctx.fillStyle = '#87ceeb';
                ctx.beginPath();
                ctx.moveTo(cx, cy - 4);
                ctx.quadraticCurveTo(cx - 16, cy - 14, cx - 22, cy + 2);
                ctx.quadraticCurveTo(cx - 12, cy + 4, cx, cy + 6);
                ctx.quadraticCurveTo(cx + 12, cy + 4, cx + 22, cy + 2);
                ctx.quadraticCurveTo(cx + 16, cy - 14, cx, cy - 4);
                ctx.fill();

                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(cx, cy - 4);
                ctx.lineTo(cx, cy + 6);
                ctx.stroke();
            }

            drawStone(cx, cy) {
                ctx.save();
                ctx.translate(cx, cy);
                drawRock(ctx, 14);
                ctx.restore();
            }

            drawShield(cx, cy) {
                ctx.save();
                ctx.translate(cx, cy);
                ctx.fillStyle = '#3498db';
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;

                // 经典盾牌轮廓
                ctx.beginPath();
                ctx.moveTo(0, -14);
                ctx.bezierCurveTo(12, -12, 14, -2, 14, 4);
                ctx.bezierCurveTo(14, 16, 4, 22, 0, 26);
                ctx.bezierCurveTo(-4, 22, -14, 16, -14, 4);
                ctx.bezierCurveTo(-14, -2, -12, -12, 0, -14);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // 中央十字/装饰
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, -10);
                ctx.lineTo(0, 18);
                ctx.moveTo(-8, 2);
                ctx.lineTo(8, 2);
                ctx.stroke();

                ctx.restore();
            }

            drawJeep(cx, cy) {
                ctx.save();
                ctx.translate(cx, cy);
                const w = 72, h = 52;
                if (jeepImg.complete && jeepImg.naturalWidth > 0) {
                    ctx.drawImage(jeepImg, -w / 2, -h / 2, w, h);
                } else {
                    ctx.fillStyle = '#2ecc71';
                    ctx.beginPath();
                    ctx.roundRect(-w / 2, -h / 2, w, h, 6);
                    ctx.fill();
                    ctx.fillStyle = '#27ae60';
                    ctx.beginPath();
                    ctx.roundRect(-w / 2 + 8, -h / 2 - 10, w - 16, 12, 3);
                    ctx.fill();
                }
                ctx.restore();
            }

            drawFootball(cx, cy) {
                ctx.save();
                ctx.translate(cx, cy);
                const size = 56;
                if (footballImg.complete && footballImg.naturalWidth > 0) {
                    ctx.drawImage(footballImg, -size / 2, -size / 2, size, size);
                } else {
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(0, 0, size / 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(-14, -8); ctx.lineTo(14, 8);
                    ctx.moveTo(-14, 8); ctx.lineTo(14, -8);
                    ctx.stroke();
                }
                ctx.restore();
            }

            drawSkillBook(cx, cy) {
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(Math.sin(frameCount * 0.1 + this.bobOffset) * 0.1);

                if (bookImg.complete && bookImg.naturalWidth > 0) {
                    const w = 36;
                    const h = 36;
                    ctx.drawImage(bookImg, -w / 2, -h / 2, w, h);
                } else {
                    // fallback：书本样式
                    ctx.fillStyle = '#8e44ad';
                    ctx.beginPath();
                    ctx.roundRect(-14, -18, 28, 36, 3);
                    ctx.fill();
                    ctx.fillStyle = '#f5f5dc';
                    ctx.beginPath();
                    ctx.roundRect(-10, -14, 20, 28, 2);
                    ctx.fill();
                    ctx.strokeStyle = '#8e44ad';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(0, -14); ctx.lineTo(0, 14);
                    ctx.stroke();
                    ctx.strokeStyle = '#555';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(-6, -7); ctx.lineTo(-2, -7);
                    ctx.moveTo(3, -7); ctx.lineTo(7, -7);
                    ctx.moveTo(-6, 0); ctx.lineTo(7, 0);
                    ctx.moveTo(-6, 7); ctx.lineTo(7, 7);
                    ctx.stroke();
                    ctx.strokeStyle = '#d2b4de';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.roundRect(-14, -18, 28, 36, 3);
                    ctx.stroke();
                }

                ctx.restore();
            }

            drawRocket(cx, cy) {
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(Math.sin(frameCount * 0.1 + this.bobOffset) * 0.08);
                const w = this.width;
                const h = this.height;
                if (roketImg.complete && roketImg.naturalWidth > 0) {
                    ctx.drawImage(roketImg, -w / 2, -h / 2, w, h);
                } else {
                    ctx.fillStyle = '#e74c3c';
                    ctx.beginPath();
                    ctx.moveTo(0, -h / 2);
                    ctx.lineTo(w / 3, h / 4);
                    ctx.lineTo(0, h / 6);
                    ctx.lineTo(-w / 3, h / 4);
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = '#ecf0f1';
                    ctx.fillRect(-w / 4, h / 6, w / 2, h / 3);
                }
                ctx.restore();
            }

            getHitbox() {
                return {
                    x: this.x,
                    y: this.y,
                    width: this.width,
                    height: this.height
                };
            }
        }

        // ===== 石块投射物类 =====
        class StoneProjectile {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 24;
                this.height = 18;
                this.vx = STONE_SPEED;
                this.vy = -3;
                this.rotation = 0;
                this.hit = false;
            }

            update() {
                if (this.hit) return;
                this.x += this.vx;
                this.y += this.vy;
                this.vy += GRAVITY;
                this.rotation += 0.2;
                if (this.y > GROUND_Y - this.height / 2) {
                    this.y = GROUND_Y - this.height / 2;
                    this.vy *= -0.5;
                }
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
                ctx.rotate(this.rotation);
                drawRock(ctx, 12);
                ctx.restore();
            }

            getHitbox() {
                return {
                    x: this.x,
                    y: this.y,
                    width: this.width,
                    height: this.height
                };
            }
        }

        // ===== 吉普车子弹（打地面怪兽） =====
        class JeepBullet {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 16;
                this.height = 6;
                this.vx = 12;
                this.vy = 0;
                this.hit = false;
                this.dying = false;
            }

            update() {
                if (this.hit) return;
                if (this.dying) {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy += GRAVITY;
                    if (this.y > GROUND_Y + 20) this.hit = true; // 掉出屏幕下方
                    return;
                }
                this.x += this.vx;
            }

            draw(ctx) {
                ctx.save();
                ctx.fillStyle = '#f1c40f';
                ctx.beginPath();
                ctx.ellipse(this.x + this.width / 2, this.y + this.height / 2, this.width / 2, this.height / 2, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'rgba(255, 255, 200, 0.6)';
                ctx.beginPath();
                ctx.arc(this.x, this.y + this.height / 2, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            getHitbox() {
                return {
                    x: this.x,
                    y: this.y,
                    width: this.width,
                    height: this.height
                };
            }

            onHit() {
                // 被怪兽阻挡后反弹下落，掉出屏幕
                this.dying = true;
                this.vx = -2;
                this.vy = -5;
            }
        }

        // ===== 吉普车导弹（打飞行怪兽，带轻微追踪） =====
        class JeepMissile {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 22;
                this.height = 14;
                this.vx = 10;
                this.vy = -3;        // 更陡的向上斜率
                this.trail = [];
                this.hit = false;
            }

            update() {
                if (this.hit) return;
                // 轻微追踪最近的飞行怪兽
                let target = null;
                let minDist = Infinity;
                for (const m of monsters) {
                    if (m.isKnocked || m.type !== 'flying') continue;
                    const d = m.x - this.x;
                    if (d > -50 && d < minDist) {
                        minDist = d;
                        target = m;
                    }
                }
                if (target) {
                    const targetY = target.y + target.height / 2 - this.height / 2;
                    const dy = targetY - this.y;
                    if (dy < -4) this.vy -= 0.25;
                    else if (dy > 4) this.vy += 0.25;
                    this.vy = Math.max(this.vy, -5);
                    this.vy = Math.min(this.vy, 2);
                } else if (this.vy > -3) {
                    this.vy -= 0.08;
                }

                this.x += this.vx;
                this.y += this.vy;
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 10) this.trail.shift();
            }

            draw(ctx) {
                const cx = this.x + this.width / 2;
                const cy = this.y + this.height / 2;
                ctx.save();

                // 尾焰：沿弹体中心轴线向后延伸
                ctx.fillStyle = 'rgba(255, 120, 50, 0.65)';
                this.trail.forEach((p, i) => {
                    const tx = p.x + this.width / 2;
                    const ty = p.y + this.height / 2;
                    const radius = 2 + i * 0.6;
                    ctx.beginPath();
                    ctx.arc(tx - this.width / 2 - 4 - i, ty, radius, 0, Math.PI * 2);
                    ctx.fill();
                });

                // 弹体：沿中心轴线绘制的尖头导弹
                ctx.fillStyle = '#e74c3c';
                ctx.beginPath();
                ctx.moveTo(this.x + this.width, cy);           // 鼻尖
                ctx.lineTo(this.x + this.width - 8, this.y);   // 上肩
                ctx.lineTo(this.x + 4, this.y + 3);            // 上尾
                ctx.lineTo(this.x, cy);                         // 尾喷口中心
                ctx.lineTo(this.x + 4, this.y + this.height - 3); // 下尾
                ctx.lineTo(this.x + this.width - 8, this.y + this.height); // 下肩
                ctx.closePath();
                ctx.fill();

                // 弹翼
                ctx.fillStyle = '#c0392b';
                ctx.beginPath();
                ctx.moveTo(this.x + this.width - 10, cy);
                ctx.lineTo(this.x + 2, this.y - 1);
                ctx.lineTo(this.x + 6, this.y + 2);
                ctx.closePath();
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(this.x + this.width - 10, cy);
                ctx.lineTo(this.x + 2, this.y + this.height + 1);
                ctx.lineTo(this.x + 6, this.y + this.height - 2);
                ctx.closePath();
                ctx.fill();

                ctx.restore();
            }

            getHitbox() {
                return {
                    x: this.x,
                    y: this.y,
                    width: this.width,
                    height: this.height
                };
            }
        }

        // ===== 足球踢出后的投射物 =====
        class FootballKick {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 56;
                this.height = 56;
                this.vx = 6;       // 减慢速度，延长在屏时间
                this.vy = -2.5;
                this.rotation = 0;
                this.hit = false;
            }

            update() {
                if (this.hit) return;
                this.x += this.vx;
                this.y += this.vy;
                this.vy += GRAVITY * 0.25;
                this.rotation += 0.18;
                const groundLevel = GROUND_Y - this.height / 2;
                if (this.y > groundLevel) {
                    this.y = groundLevel;
                    this.vy *= -0.6;
                }
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
                ctx.rotate(this.rotation);
                if (footballImg.complete && footballImg.naturalWidth > 0) {
                    ctx.drawImage(footballImg, -this.width / 2, -this.height / 2, this.width, this.height);
                } else {
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(0, 0, this.width / 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(-14, -8); ctx.lineTo(14, 8);
                    ctx.moveTo(-14, 8); ctx.lineTo(14, -8);
                    ctx.stroke();
                }
                ctx.restore();
            }

            getHitbox() {
                return {
                    x: this.x + 8,
                    y: this.y + 8,
                    width: this.width - 16,
                    height: this.height - 16
                };
            }
        }

        // ===== 火箭道具飞行与爆炸 =====
        class Rocket {
            constructor(startX, startY, targetX, duration, arcHeight) {
                this.startX = startX;
                this.startY = startY;
                this.targetX = targetX;
                this.targetY = GROUND_Y - 10;
                this.width = 48;
                this.height = 80;
                this.arcHeight = arcHeight;
                this.frame = 0;
                this.duration = duration;
                this.x = startX;
                this.y = startY;
                this.rotation = 0;
                this.exploded = false;
            }

            update() {
                if (this.exploded) return;
                this.frame++;
                const t = Math.min(this.frame / this.duration, 1);
                // 非线性缓动：前半段慢（上升慢），后半段快（下落快，尾段更快）
                const et = Math.pow(t, ROCKET_EASE_POWER);
                const prevX = this.x;
                const prevY = this.y;

                // 抛物线插值：中间向上拱起
                this.x = this.startX + (this.targetX - this.startX) * et;
                const linearY = this.startY + (this.targetY - this.startY) * et;
                this.y = linearY - Math.sin(et * Math.PI) * this.arcHeight;

                // 根据运动方向计算旋转角度
                const dx = this.x - prevX;
                const dy = this.y - prevY;
                if (dx !== 0 || dy !== 0) {
                    const angle = Math.atan2(dy, dx);
                    // 贴图默认朝上，0 度对应朝上 (-PI/2)，需要补正 PI/2
                    this.rotation = angle + Math.PI / 2;
                }

                if (this.frame >= this.duration) {
                    this.explode();
                }
            }

            explode() {
                this.exploded = true;
                activeExplosion = new Explosion(this.targetX, this.targetY);
                playExplosionSound();
                // 秒杀当前屏幕上的所有怪物
                for (const monster of monsters) {
                    if (monster.isKnocked) continue;
                    knockMonster(monster, 1, true);
                }
            }

            draw(ctx) {
                if (this.exploded) return;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                const w = this.width;
                const h = this.height;
                if (roketImg.complete && roketImg.naturalWidth > 0) {
                    ctx.drawImage(roketImg, -w / 2, -h / 2, w, h);
                } else {
                    // fallback：简单火箭
                    ctx.fillStyle = '#e74c3c';
                    ctx.beginPath();
                    ctx.moveTo(0, -h / 2);
                    ctx.lineTo(w / 3, h / 4);
                    ctx.lineTo(0, h / 6);
                    ctx.lineTo(-w / 3, h / 4);
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = '#ecf0f1';
                    ctx.fillRect(-w / 4, h / 6, w / 2, h / 3);
                }

                ctx.restore();
            }
        }

        class Explosion {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.frame = 0;
                this.duration = ROCKET_EXPLOSION_DURATION;
                this.width = 160;
                this.height = 160;
            }

            update() {
                this.frame++;
            }

            draw(ctx) {
                const t = this.frame / this.duration;
                const scale = 0.5 + t * 1.2;
                const alpha = 1 - t;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.translate(this.x, this.y);
                ctx.scale(scale, scale);
                if (boomImg.complete && boomImg.naturalWidth > 0) {
                    ctx.drawImage(boomImg, -this.width / 2, -this.height / 2, this.width, this.height);
                } else {
                    // fallback：爆炸圆
                    ctx.fillStyle = '#f39c12';
                    ctx.beginPath();
                    ctx.arc(0, 0, this.width / 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#e74c3c';
                    ctx.lineWidth = 8;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.width / 2 + 10, 0, Math.PI * 2);
                    ctx.stroke();
                }
                ctx.restore();
            }

            isFinished() {
                return this.frame >= this.duration;
            }
        }

        // ===== 怪兽生成算法 =====
        function spawnMonster() {
            const currentSpeed = getCurrentMonsterSpeed();
            const lastMonster = monsters.length > 0 ? monsters[monsters.length - 1] : null;

            if (lastMonster) {
                const distance = SPAWN_MARGIN_RIGHT - lastMonster.x;
                if (distance < MIN_GAP_BETWEEN_MONSTERS) {
                    return;
                }
            }

            const rand = Math.random();
            let type;
            if (rand < 0.30) {
                type = 'normal';
            } else if (rand < 0.48) {
                type = 'big';
            } else if (rand < 0.66) {
                type = 'yellow';
            } else if (rand < 0.80) {
                type = 'fast';
            } else if (rand < 0.88) {
                type = 'combo';
            } else if (rand < 0.94) {
                type = 'adjacent'; // 两个无间隙并排的小怪兽
            } else {
                type = 'stacked'; // 上下重叠的小怪兽
            }

            if (type === 'combo') {
                const comboCount = Math.random() < 0.5 ? 2 : 3;
                const gap = COMBO_GAP_MIN + Math.random() * (COMBO_GAP_MAX - COMBO_GAP_MIN);
                for (let i = 0; i < comboCount; i++) {
                    const x = SPAWN_MARGIN_RIGHT + i * gap;
                    monsters.push(new Monster('normal', x, currentSpeed));
                }
            } else if (type === 'adjacent') {
                monsters.push(new Monster('normal', SPAWN_MARGIN_RIGHT, currentSpeed));
                monsters.push(new Monster('normal', SPAWN_MARGIN_RIGHT + MONSTER_WIDTH, currentSpeed));
            } else if (type === 'stacked') {
                const bottom = new Monster('normal', SPAWN_MARGIN_RIGHT, currentSpeed);
                const top = new Monster('normal', SPAWN_MARGIN_RIGHT, currentSpeed);
                top.y = bottom.y - bottom.height + 5;
                bottom.stackRole = 'bottom';
                bottom.stackPartner = top;
                top.stackRole = 'top';
                top.stackPartner = bottom;
                monsters.push(bottom, top);
            } else {
                monsters.push(new Monster(type, SPAWN_MARGIN_RIGHT, currentSpeed));
            }

            spawnTimer = 0;
            const intervalMul = getSpawnIntervalMultiplier();
            nextSpawnTime = (SPAWN_INTERVAL_MIN + Math.random() * (SPAWN_INTERVAL_MAX - SPAWN_INTERVAL_MIN)) * intervalMul;
        }

        // ===== 飞行怪兽生成 =====
        function spawnFlyingMonster() {
            const currentSpeed = getCurrentMonsterSpeed();
            const spawnX = SPAWN_MARGIN_RIGHT;

            // 避免飞行怪兽与任何地面怪兽在水平方向上重叠，确保玩家有可走路径
            const tooClose = monsters.some(m => {
                if (m.isKnocked || m.type === 'flying') return false;
                return Math.abs(m.x - spawnX) < SAFE_FLYING_MONSTER_GAP;
            });

            if (!tooClose) {
                monsters.push(new Monster('flying', spawnX, currentSpeed));
            }
            flyingSpawnTimer = 0;
            const flyIntervalMul = getSpawnIntervalMultiplier();
            nextFlyingSpawnTime = (FLYING_MONSTER_SPAWN_MIN + Math.random() * (FLYING_MONSTER_SPAWN_MAX - FLYING_MONSTER_SPAWN_MIN)) * flyIntervalMul;
        }

        // ===== 道具生成 =====
        function spawnItem() {
            const types = ['hammer', 'wings', 'stone', 'shield', 'jeep', 'football', 'rocket'];
            const type = types[Math.floor(Math.random() * types.length)];
            items.push(new Item(type, GAME_WIDTH + 30));
            itemSpawnTimer = 0;
            nextItemSpawnTime = getNextItemSpawnTime();
        }

        // ===== 获取当前怪兽速度（动态难度：每10分提升5%） =====
        function getCurrentMonsterSpeed() {
            // 从第 7 分开始，每 10 分速度倍数 +0.1（1.0 -> 1.1 -> 1.2 ...）
            const speedMultiplier = 1.0 + 0.1 * Math.floor((score + 3) / 10);
            return MONSTER_SPEED_BASE * speedMultiplier;
        }

        // ===== 获取下一次道具生成间隔（每20分缩短1秒，保留随机范围） =====
        function getNextItemSpawnTime() {
            const reduction = Math.floor(score / 20) * 60; // 每20分减少1秒（60帧）
            const min = Math.max(120, ITEM_SPAWN_INTERVAL_MIN - reduction);
            const max = Math.max(min + 120, ITEM_SPAWN_INTERVAL_MAX - reduction);
            return min + Math.random() * (max - min);
        }

        // ===== 更新得分与速度显示 =====
        function updateScoreDisplay() {
            scoreDisplay.textContent = `得分: ${score}`;
            const speedMultiplier = getCurrentMonsterSpeed() / MONSTER_SPEED_BASE;
            speedDisplay.textContent = `速度: ${speedMultiplier.toFixed(1)}x`;
        }

        // ===== 获取当前怪兽生成间隔倍数（线性密度：每10分密度+10%，间隔缩短） =====
        function getSpawnIntervalMultiplier() {
            const level = Math.floor(score / 10);
            return 1 / (1 + DENSITY_INCREMENT * level);
        }

        // ===== 角色跳跃 =====
        function jump() {
            if (gameState !== 'playing' || player.isDead) return;

            // 吉普车状态下按空格发射一发对地子弹
            if (player.jeepTimer > 0) {
                if (player.jeepAmmo > 0) {
                    const jeepFrontX = player.x + player.width / 2 + 55;
                    projectiles.push(new JeepBullet(jeepFrontX, GROUND_Y - 10));
                    player.jeepAmmo--;
                    playJumpSound();
                }
                return;
            }

            // 足球带球期间按空格从地面踢出
            if (player.footballTimer > 0 && !player.footballKicked) {
                const ballSize = 56;
                player.footballKicked = true;
                player.footballTimer = 0; // 踢出后计时立即结束
                projectiles.push(new FootballKick(player.footballX, GROUND_Y - ballSize / 2));
                playJumpSound();
                return;
            }

            if (player.flyTimer > 0) {
                // 飞行中再次按键可提前降落
                player.flyTimer = 0;
                player.vy = 0;
                return;
            }

            if (!player.isJumping) {
                player.vy = JUMP_VELOCITY;
                player.isJumping = true;
                player.jumpCount = 1;
                playJumpSound();

                // 同步触发屏幕内黄色怪兽跳跃
                monsters.forEach(monster => {
                    if (monster.type === 'yellow' && !monster.isJumping && !monster.isKnocked &&
                        monster.x + monster.width > -50 && monster.x < GAME_WIDTH + 50 &&
                        monster.x > player.x) {
                        monster.vy = YELLOW_JUMP_VELOCITY;
                        monster.isJumping = true;
                    }
                });
            }
        }

        // ===== 更新角色物理 =====
        function updatePlayer() {
            if (player.isDead) {
                player.deathTimer++;
                player.y += 4;
                player.deathRotation += 0.12;
                if (player.deathTimer >= DEATH_ANIMATION_DURATION) {
                    gameOver();
                }
                return;
            }

            if (player.invincibleTimer > 0) player.invincibleTimer--;
            if (player.shieldTimer > 0) player.shieldTimer--;

            // 锤子持续时间到，掉落消失
            if (player.invincibleTimer <= 0 && player.hammerHits > 0) {
                dropHammer();
            }

            if (player.jeepTimer > 0) {
                // 吉普车状态下保持在地面，弹药耗尽后下车
                if (player.jeepAmmo <= 0) {
                    player.jeepTimer = 0;
                }
                const groundLevel = GROUND_Y - PLAYER_HEIGHT + GROUND_Y_OFFSET;
                player.y = groundLevel;
                player.vy = 0;
                player.isJumping = false;
                player.flyTimer = 0;
                if (player.jeepTimer > 0) return;
            }

            // 下车后开始暂存的足球（保留剩余时间）
            if (player.footballPending) {
                player.footballPending = false;
                if (player.footballTimer <= 0) {
                    player.footballTimer = FOOTBALL_DRIBBLE_DURATION;
                }
                player.footballKicked = false;
                player.footballX = player.x + player.width + 10;
                player.footballY = GROUND_Y - 18;
            }

            if (player.footballTimer > 0) {
                player.footballTimer--;
                // 足球跟随玩家脚底滚动
                const ballSize = 56;
                player.footballX = player.x + player.width + 4;
                player.footballY = GROUND_Y - ballSize + 6;
            } else if (!player.footballKicked) {
                // 时间到未踢出：球停在原地并向后滚动消失
                const ballSize = 56;
                player.footballX -= getCurrentMonsterSpeed();
                player.footballY = GROUND_Y - ballSize + 6;
                if (player.footballX + ballSize < 0) {
                    player.footballKicked = true; // 状态清理
                }
            }

            if (player.flyTimer > 0) {
                player.flyTimer--;
                const targetY = GROUND_Y - PLAYER_HEIGHT - FLY_HEIGHT_OFFSET;
                player.y += (targetY - player.y) * 0.08;
                player.isJumping = true;
                return;
            }

            player.vy += GRAVITY;
            player.y += player.vy;

            const groundLevel = GROUND_Y - PLAYER_HEIGHT + GROUND_Y_OFFSET;
            if (player.y >= groundLevel) {
                player.y = groundLevel;
                player.vy = 0;
                player.isJumping = false;
                player.jumpCount = 0;
            }
        }

        // ===== 绘制角色 =====
        function drawPlayer() {
            const cx = player.x + player.width / 2;
            const cy = player.y + player.height / 2;

            // 锤子剩余次数显示在头顶
            if (player.hammerHits > 0) {
                ctx.save();
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 18px Arial, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.shadowColor = 'rgba(0, 0, 0, 0.6)';
                ctx.shadowBlur = 4;
                ctx.fillText(`🔨 ${player.hammerHits}`, cx, cy - 45);
                ctx.restore();
            }

            // 吉普车状态：直接绘制吉普车和驾驶员
            if (player.jeepTimer > 0) {
                ctx.save();
                const jeepW = 110;
                const jeepH = 78;
                const jeepX = cx - jeepW / 2;
                const jeepY = GROUND_Y - jeepH + 4;
                const bounce = Math.sin(frameCount * 0.3) * 2;
                // 车身贴图
                if (jeepImg.complete && jeepImg.naturalWidth > 0) {
                    ctx.drawImage(jeepImg, jeepX, jeepY + bounce, jeepW, jeepH);
                } else {
                    ctx.fillStyle = '#2ecc71';
                    ctx.beginPath();
                    ctx.roundRect(jeepX, jeepY + bounce, jeepW, jeepH, 8);
                    ctx.fill();
                    ctx.fillStyle = '#27ae60';
                    ctx.beginPath();
                    ctx.roundRect(jeepX + 12, jeepY - 14 + bounce, jeepW - 24, 18, 4);
                    ctx.fill();
                    // 车轮
                    ctx.fillStyle = '#1a252f';
                    [jeepX + 22, jeepX + jeepW - 22].forEach(wx => {
                        ctx.beginPath();
                        ctx.arc(wx, jeepY + jeepH - 8 + bounce, 12, 0, Math.PI * 2);
                        ctx.fill();
                    });
                }
                // 驾驶员头像
                if (avatarLoaded(playerAvatar)) {
                    const headR = 18;
                    const driverX = jeepX + jeepW * 0.42;
                    const driverY = jeepY + jeepH * 0.32 + bounce;
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(driverX, driverY, headR, 0, Math.PI * 2);
                    ctx.clip();
                    ctx.drawImage(playerAvatar, driverX - headR, driverY - headR, headR * 2, headR * 2);
                    ctx.restore();

                    // 车上装载的足球：显示在头像左侧（静止不转）
                    if (player.footballPending) {
                        const ballSize = 22;
                        const ballX = driverX - headR - ballSize - 4;
                        const ballY = driverY - ballSize / 2;
                        if (footballImg.complete && footballImg.naturalWidth > 0) {
                            ctx.drawImage(footballImg, ballX, ballY, ballSize, ballSize);
                        } else {
                            ctx.fillStyle = '#fff';
                            ctx.beginPath();
                            ctx.arc(ballX + ballSize / 2, ballY + ballSize / 2, ballSize / 2, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                }
                ctx.restore();
                return;
            }

            const headY = -player.height * 0.3;
            const headRadius = player.width * 0.65;

            ctx.save();
            ctx.translate(cx, cy);
            if (player.isDead) {
                ctx.rotate(player.deathRotation);
            }

            // 身体
            ctx.fillStyle = '#3498db';
            ctx.beginPath();
            ctx.ellipse(0, 0, player.width * 0.35, player.height * 0.3, 0, 0, Math.PI * 2);
            ctx.fill();

            // 腿（跑步动画）
            ctx.strokeStyle = '#2980b9';
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            const legAnim = player.isJumping ? 0.5 : Math.sin(frameCount * 0.2) * 0.5;
            const legStartY = player.height * 0.5 - 8;
            const legEndY = player.height * 0.5 + 2;

            ctx.beginPath();
            ctx.moveTo(-6, legStartY);
            ctx.lineTo(-6 + legAnim * 12, legEndY);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(6, legStartY);
            ctx.lineTo(6 - legAnim * 12, legEndY);
            ctx.stroke();

            // 手臂（加长，避免被大头像挡住）
            ctx.strokeStyle = '#f1c40f';
            ctx.lineWidth = 4;
            const armY = player.height * 0.05;
            const leftHandY = armY + (player.isJumping ? -5 : Math.sin(frameCount * 0.2) * 3);
            const rightHandY = armY + (player.isJumping ? 5 : -Math.sin(frameCount * 0.2) * 3);
            const handX = 28;

            ctx.beginPath();
            ctx.moveTo(-8, -player.height * 0.05);
            ctx.lineTo(-handX, leftHandY);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(8, -player.height * 0.05);
            ctx.lineTo(handX, rightHandY);
            ctx.stroke();

            // 头部：头像或 fallback
            if (avatarLoaded(playerAvatar)) {
                ctx.save();
                ctx.beginPath();
                ctx.arc(0, headY, headRadius, 0, Math.PI * 2);
                ctx.clip();
                ctx.drawImage(playerAvatar, -headRadius, headY - headRadius, headRadius * 2, headRadius * 2);
                ctx.restore();
            } else {
                ctx.fillStyle = '#f1c40f';
                ctx.beginPath();
                ctx.arc(0, headY, headRadius, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(-5, headY - 2, 4, 0, Math.PI * 2);
                ctx.arc(5, headY - 2, 4, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(-5, headY - 2, 2, 0, Math.PI * 2);
                ctx.arc(5, headY - 2, 2, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(0, headY + 5, 5, 0.1, Math.PI - 0.1);
                ctx.stroke();
            }

            ctx.restore();

            // 足球带球/未踢出滞留：在脚边或原地绘制滚动的足球
            if (!player.footballKicked && player.footballX + 60 > 0) {
                ctx.save();
                const ballSize = 56;
                ctx.translate(player.footballX + ballSize / 2, player.footballY + ballSize / 2);
                ctx.rotate(frameCount * 0.25);
                if (footballImg.complete && footballImg.naturalWidth > 0) {
                    ctx.drawImage(footballImg, -ballSize / 2, -ballSize / 2, ballSize, ballSize);
                } else {
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(0, 0, ballSize / 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(-14, -8); ctx.lineTo(14, 8);
                    ctx.moveTo(-14, 8); ctx.lineTo(14, -8);
                    ctx.stroke();
                }
                ctx.restore();
            }

            // 手持锤子挥舞效果
            if (player.hammerHits > 0 && player.jeepTimer <= 0) {
                ctx.save();
                const handXAbs = cx + handX;
                const handYAbs = cy + rightHandY;
                ctx.translate(handXAbs, handYAbs);
                ctx.rotate(Math.sin(frameCount * 0.5) * 0.9 - 0.3);

                // 锤柄
                ctx.fillStyle = '#8b4513';
                ctx.beginPath();
                ctx.roundRect(-3, -18, 6, 32, 2);
                ctx.fill();

                // 锤头
                ctx.fillStyle = '#7f8c8d';
                ctx.beginPath();
                ctx.roundRect(-12, -28, 24, 12, 3);
                ctx.fill();

                // 锤头高光
                ctx.fillStyle = '#95a5a6';
                ctx.beginPath();
                ctx.roundRect(-10, -26, 6, 4, 1);
                ctx.fill();

                ctx.restore();
            }

            // 手持盾牌效果（挡在身前）
            if (player.shieldTimer > 0) {
                ctx.save();
                const shieldX = cx + handX + 6;
                const shieldY = cy + rightHandY;
                ctx.translate(shieldX, shieldY);
                ctx.scale(0.9, 0.9);
                ctx.rotate(Math.sin(frameCount * 0.2) * 0.05);

                ctx.fillStyle = '#3498db';
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;

                // 盾牌主体
                ctx.beginPath();
                ctx.moveTo(0, -26);
                ctx.bezierCurveTo(18, -22, 22, -4, 22, 6);
                ctx.bezierCurveTo(22, 26, 6, 36, 0, 44);
                ctx.bezierCurveTo(-6, 36, -22, 26, -22, 6);
                ctx.bezierCurveTo(-22, -4, -18, -22, 0, -26);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // 装饰十字
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(0, -18);
                ctx.lineTo(0, 32);
                ctx.moveTo(-12, 4);
                ctx.lineTo(12, 4);
                ctx.stroke();

                ctx.restore();
            }

            // 翅膀特效
            if (player.flyTimer > 0) {
                ctx.save();
