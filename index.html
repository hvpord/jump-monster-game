                ctx.fillStyle = 'rgba(135, 206, 235, 0.85)';
                const flap = Math.sin(frameCount * 0.4) * 8;

                ctx.beginPath();
                ctx.moveTo(cx - 6, cy);
                ctx.quadraticCurveTo(cx - 28, cy - 18 + flap, cx - 36, cy + 6);
                ctx.quadraticCurveTo(cx - 22, cy + 8, cx - 6, cy + 4);
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(cx + 6, cy);
                ctx.quadraticCurveTo(cx + 28, cy - 18 + flap, cx + 36, cy + 6);
                ctx.quadraticCurveTo(cx + 22, cy + 8, cx + 6, cy + 4);
                ctx.fill();
                ctx.restore();
            }
        }

        // ===== 绘制背景 =====
        function drawBackground() {
            switch (currentScene) {
                case 'grassland': drawGrassland(); break;
                case 'city': drawCity(); break;
                case 'desert': drawDesert(); break;
                case 'night': drawNight(); break;
                case 'railway': drawRailway(); break;
                case 'rain': drawRain(); break;
                default: drawNight();
            }
        }

        // ===== 场景切换 =====
        function switchScene() {
            const prev = currentScene;
            let next;
            do {
                next = SCENES[Math.floor(Math.random() * SCENES.length)].id;
            } while (next === prev);
            currentScene = next;

            // 初始化场景元素
            if (currentScene === 'rain') {
                rainDrops = [];
                for (let i = 0; i < 40; i++) {
                    rainDrops.push({
                        x: Math.random() * GAME_WIDTH,
                        y: Math.random() * GAME_HEIGHT,
                        len: Math.random() * 15 + 10,
                        speed: Math.random() * 8 + 12
                    });
                }
            }
            if (currentScene === 'city') {
                cityBuildings = [];
                cityLaneOffset = 0;
                let bx = 0;
                const shapes = ['square', 'tower', 'arch', 'stepped', 'wide'];
                while (bx < GAME_WIDTH * 2.5) {
                    const shape = shapes[Math.floor(Math.random() * shapes.length)];
                    const bw = Math.random() * 60 + 50;      // 50-110
                    const bh = Math.random() * 140 + 120;    // 120-260
                    const windows = [];
                    const winW = 16;
                    const winH = 20;
                    const padX = 20;
                    const padY = 28;
                    for (let wy = padY; wy < bh - padY; wy += padY) {
                        for (let wx = padX; wx < bw - padX; wx += padX) {
                            windows.push({ x: wx, y: wy, w: winW, h: winH, lit: Math.random() > 0.25 });
                        }
                    }
                    cityBuildings.push({ x: bx, width: bw, height: bh, shape, windows });
                    bx += bw + Math.random() * 50 + 30;  // 30-80 间距
                }
            }
            if (currentScene === 'desert') {
                desertCamelX = GAME_WIDTH + Math.random() * 200;
                // 随机生成仙人掌：3-5 棵，随机位置、高度和大小
                desertCacti = [];
                const cactusCount = Math.floor(Math.random() * 3) + 3;
                for (let i = 0; i < cactusCount; i++) {
                    desertCacti.push({
                        x: Math.random() * GAME_WIDTH,
                        y: GROUND_Y - Math.random() * 15,
                        scale: Math.random() * 0.5 + 0.7 // 0.7 - 1.2
                    });
                }
            }
            if (currentScene === 'grassland') {
                // 随机生成绵羊：3-6 只，随机位置、大小和朝向
                grasslandSheep = [];
                const sheepCount = Math.floor(Math.random() * 4) + 3;
                for (let i = 0; i < sheepCount; i++) {
                    grasslandSheep.push({
                        x: Math.random() * GAME_WIDTH,
                        y: GROUND_Y - Math.random() * 20,
                        scale: Math.random() * 0.3 + 0.5, // 0.5 - 0.8
                        facingRight: Math.random() > 0.5
                    });
                }
            }
            if (currentScene === 'railway') {
                trainX = -400 - Math.random() * 300;
            }

            sceneTimer = 0;
            nextSceneTime = SCENE_SWITCH_MIN + Math.random() * (SCENE_SWITCH_MAX - SCENE_SWITCH_MIN);
        }

        function updateScene() {
            sceneTimer++;
            if (sceneTimer >= nextSceneTime) {
                switchScene();
            }

            // 铁路火车移动
            if (currentScene === 'railway') {
                trainX += 1.5;
                if (trainX > GAME_WIDTH + 200) {
                    trainX = -400 - Math.random() * 300;
                }
                // 远山缓慢向后移动
                railwayMountainOffset = (railwayMountainOffset + getCurrentMonsterSpeed() * 0.03) % GAME_WIDTH;
            }

            // 沙漠骆驼移动
            if (currentScene === 'desert') {
                desertCamelX -= 0.8;
                if (desertCamelX < -150) {
                    desertCamelX = GAME_WIDTH + Math.random() * 300 + 100;
                }
                // 仙人掌缓慢移动，移出屏幕后从右侧重新随机生成
                const cactusSpeed = getCurrentMonsterSpeed() * 0.08;
                desertCacti.forEach(c => { c.x -= cactusSpeed; });
                desertCacti = desertCacti.filter(c => c.x > -60);
                while (desertCacti.length < 4) {
                    desertCacti.push({
                        x: GAME_WIDTH + Math.random() * 200,
                        y: GROUND_Y - Math.random() * 15,
                        scale: Math.random() * 0.5 + 0.7
                    });
                }
            }

            // 城市建筑滚动
            if (currentScene === 'city') {
                const moveSpeed = getCurrentMonsterSpeed() * 0.12;
                cityBuildings.forEach(b => { b.x -= moveSpeed; });
                cityLaneOffset = (cityLaneOffset + getCurrentMonsterSpeed() * 0.5) % 80;
                if (cityBuildings.length > 1 && cityBuildings[0].x + cityBuildings[0].width < -50) {
                    const first = cityBuildings.shift();
                    const last = cityBuildings[cityBuildings.length - 1];
                    const shapes = ['square', 'tower', 'arch', 'stepped', 'wide'];
                    first.x = last.x + last.width + Math.random() * 50 + 30;
                    first.shape = shapes[Math.floor(Math.random() * shapes.length)];
                    first.width = Math.random() * 60 + 50;
                    first.height = Math.random() * 140 + 120;
                    const winW = 12;
                    const winH = 16;
                    const padX = 14;
                    const padY = 22;
                    first.windows = [];
                    for (let wy = padY; wy < first.height - padY; wy += padY) {
                        for (let wx = padX; wx < first.width - padX; wx += padX) {
                            first.windows.push({ x: wx, y: wy, w: winW, h: winH, lit: Math.random() > 0.25 });
                        }
                    }
                    cityBuildings.push(first);
                }
            }

            // 草原山丘和绵羊缓慢向后移动
            if (currentScene === 'grassland') {
                const hillSpeed = getCurrentMonsterSpeed() * 0.04;
                grasslandHillOffset = (grasslandHillOffset + hillSpeed) % GAME_WIDTH;
                const sheepSpeed = getCurrentMonsterSpeed() * 0.08;
                grasslandSheep.forEach(s => { s.x -= sheepSpeed; });
                grasslandSheep = grasslandSheep.filter(s => s.x > -80);
                while (grasslandSheep.length < 4) {
                    grasslandSheep.push({
                        x: GAME_WIDTH + Math.random() * 200,
                        y: GROUND_Y - Math.random() * 20,
                        scale: Math.random() * 0.3 + 0.5,
                        facingRight: Math.random() > 0.5
                    });
                }
            }

            // 雨滴更新
            if (currentScene === 'rain') {
                rainDrops.forEach(drop => {
                    drop.y += drop.speed;
                    drop.x -= 2;
                    if (drop.y > GAME_HEIGHT) {
                        drop.y = -drop.len;
                        drop.x = Math.random() * GAME_WIDTH;
                    }
                });
                if (Math.random() < 0.005) {
                    lightningTimer = Math.random() * 10 + 5;
                }
                if (lightningTimer > 0) lightningTimer--;
            }
        }

        function drawSun(x, y, r, color = '#f1c40f') {
            ctx.save();
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawMoon(x, y, r) {
            ctx.save();
            ctx.fillStyle = '#f5f5f5';
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'rgba(200,200,200,0.3)';
            ctx.beginPath();
            ctx.arc(x - 8, y + 5, r * 0.25, 0, Math.PI * 2);
            ctx.arc(x + 10, y - 8, r * 0.2, 0, Math.PI * 2);
            ctx.arc(x + 6, y + 12, r * 0.18, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawStars() {
            ctx.fillStyle = '#fff';
            bgStars.forEach(star => {
                const alpha = 0.5 + Math.sin(star.twinkle + frameCount * 0.05) * 0.5;
                ctx.globalAlpha = alpha;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        function drawClouds(alpha = 0.9) {
            ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
            clouds.forEach(cloud => {
                ctx.beginPath();
                ctx.ellipse(cloud.x, cloud.y, cloud.width * 0.5, 20, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cloud.x - 20, cloud.y + 5, cloud.width * 0.3, 15, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cloud.x + 20, cloud.y + 5, cloud.width * 0.3, 15, 0, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawGround(color, stripeColor, stripeWidth = 20, stripeGap = 40) {
            ctx.fillStyle = color;
            ctx.fillRect(0, GROUND_Y, GAME_WIDTH, GAME_HEIGHT - GROUND_Y);

            ctx.fillStyle = stripeColor;
            groundOffset = (groundOffset + getCurrentMonsterSpeed()) % stripeGap;
            for (let x = -groundOffset; x < GAME_WIDTH; x += stripeGap) {
                ctx.fillRect(x, GROUND_Y, stripeWidth, 4);
            }

            ctx.strokeStyle = stripeColor;
            ctx.lineWidth = 2;
            ctx.globalAlpha = 0.5;
            ctx.beginPath();
            ctx.moveTo(0, GROUND_Y);
            ctx.lineTo(GAME_WIDTH, GROUND_Y);
            ctx.stroke();
            ctx.globalAlpha = 1;
        }

        function drawHills(color, heightFactor, speedFactor, yOffset) {
            ctx.fillStyle = color;
            const offset = (groundOffset * speedFactor) % GAME_WIDTH;
            ctx.beginPath();
            ctx.moveTo(0, GROUND_Y);
            for (let x = 0; x <= GAME_WIDTH; x += 30) {
                const wx = x + offset;
                const h = Math.sin(wx * 0.01) * heightFactor + Math.sin(wx * 0.03) * heightFactor * 0.4;
                ctx.lineTo(x, GROUND_Y - yOffset - Math.abs(h));
            }
            ctx.lineTo(GAME_WIDTH, GROUND_Y);
            ctx.closePath();
            ctx.fill();
        }

        // ===== 晴空草原 =====
        function drawGrassland() {
            const grad = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
            grad.addColorStop(0, '#87CEEB');
            grad.addColorStop(0.6, '#B0E0E6');
            grad.addColorStop(1, '#E8F5E9');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            drawSun(GAME_WIDTH - 80, 60, 28);
            drawClouds(0.25);

            // 平滑的绿色山丘，缓慢向后移动
            drawGrasslandHills('#81c784', 35, grasslandHillOffset, GROUND_Y - 20, 0.6);
            drawGrasslandHills('#66bb6a', 25, grasslandHillOffset, GROUND_Y - 10, 1.0);

            // 绵羊
            grasslandSheep.forEach(s => drawSheep(s.x, s.y, s.scale, s.facingRight));

            drawGround('#4a8f29', '#6bbf4a', 20, 40);
        }

        function drawGrasslandHills(color, amplitude, offset, yBase, parallax) {
            ctx.fillStyle = color;
            const xOffset = offset * parallax;
            ctx.beginPath();
            ctx.moveTo(0, GAME_HEIGHT);
            for (let x = 0; x <= GAME_WIDTH; x += 4) {
                const wx = x + xOffset;
                const y = yBase - Math.sin(wx * 0.0035) * amplitude - Math.sin(wx * 0.009 + 1) * amplitude * 0.35;
                ctx.lineTo(x, y);
            }
            ctx.lineTo(GAME_WIDTH, GAME_HEIGHT);
            ctx.closePath();
            ctx.fill();
        }

        function drawSheep(x, y, scale = 1, facingRight = true) {
            ctx.save();
            ctx.translate(x, y);
            if (!facingRight) {
                ctx.scale(-1, 1);
            }
            ctx.scale(scale, scale);

            if (sheepImg.complete && sheepImg.naturalWidth > 0) {
                const w = 60;
                const h = 45;
                ctx.drawImage(sheepImg, -w / 2, -h, w, h);
            } else {
                // fallback：简单白团绵羊
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.ellipse(0, -15, 20, 14, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(15, -22, 10, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.arc(18, -24, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.fillRect(-8, -2, 4, 8);
                ctx.fillRect(8, -2, 4, 8);
            }
            ctx.restore();
        }

        // ===== 城市街道 =====
        function drawCity() {
            const grad = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
            grad.addColorStop(0, '#87CEFA');
            grad.addColorStop(0.5, '#B0C4DE');
            grad.addColorStop(1, '#E0E0E0');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            drawClouds(0.7);

            // 高楼大厦（更大、更稀疏、形状多样）
            cityBuildings.forEach(b => {
                drawBuilding(b);
            });

            drawGround('#455a64', '#90a4ae', 25, 35);

            // 马路斑马线（使用独立偏移，速度较慢）
            ctx.fillStyle = '#fff';
            for (let x = -cityLaneOffset; x < GAME_WIDTH; x += 80) {
                ctx.fillRect(x, GROUND_Y + 25, 40, 5);
            }
        }

        function drawBuilding(b) {
            const bx = b.x;
            const by = GROUND_Y - b.height;
            const bw = b.width;
            const bh = b.height;
            if (bx + bw < -50 || bx > GAME_WIDTH) return;

            ctx.save();
            ctx.translate(bx, by);

            // 楼体
            ctx.fillStyle = '#546e7a';
            switch (b.shape) {
                case 'square':
                    ctx.fillRect(0, 0, bw, bh);
                    break;
                case 'tower':
                    ctx.fillRect(bw * 0.15, 0, bw * 0.7, bh);
                    ctx.fillRect(0, -bh * 0.15, bw, bh * 0.15);
                    break;
                case 'arch':
                    ctx.fillRect(0, bh * 0.25, bw, bh * 0.75);
                    ctx.beginPath();
                    ctx.arc(bw / 2, bh * 0.25, bw / 2, Math.PI, 0);
                    ctx.lineTo(bw, bh * 0.25);
                    ctx.lineTo(0, bh * 0.25);
                    ctx.fill();
                    break;
                case 'stepped':
                    ctx.fillRect(0, 0, bw, bh);
                    ctx.fillStyle = '#607d8b';
                    ctx.fillRect(bw * 0.1, -bh * 0.12, bw * 0.8, bh * 0.12);
                    ctx.fillRect(bw * 0.25, -bh * 0.22, bw * 0.5, bh * 0.1);
                    break;
                case 'wide':
                default:
                    ctx.fillRect(0, 0, bw, bh);
                    ctx.fillStyle = '#607d8b';
                    ctx.fillRect(bw * 0.2, -bh * 0.08, bw * 0.6, bh * 0.08);
                    break;
            }

            // 窗户（更大的窗户）
            ctx.fillStyle = '#fff59d';
            b.windows.forEach(w => {
                if (w.lit) {
                    ctx.fillRect(w.x, w.y, w.w, w.h);
                }
            });

            // 楼体高光
            ctx.fillStyle = 'rgba(255,255,255,0.12)';
            ctx.fillRect(bw * 0.08, 0, bw * 0.12, bh);

            ctx.restore();
        }

        // ===== 沙漠 =====
        function drawDesert() {
            const grad = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
            grad.addColorStop(0, '#FFD54F');
            grad.addColorStop(0.5, '#FFCC80');
            grad.addColorStop(1, '#F4A460');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            drawSun(GAME_WIDTH - 100, 80, 40, '#ff9800');

            // 沙丘
            drawHills('#e6c278', 35, 0.25, 60);
            drawHills('#d4a86b', 25, 0.4, 35);

            // 骆驼
            drawCamel(desertCamelX, GROUND_Y - 70);

            // 仙人掌（随机位置和大小）
            desertCacti.forEach(c => drawCactus(c.x, c.y, c.scale));

            drawGround('#d2b48c', '#c19a6b', 18, 45);
        }

        function drawCamel(x, y) {
            ctx.save();
            // 优先使用 camel.jpg 贴图
            if (camelImg.complete && camelImg.naturalWidth > 0) {
                const camelW = 120;
                const camelH = 90;
                ctx.drawImage(camelImg, x - camelW / 2, y - camelH / 2, camelW, camelH);
                ctx.restore();
                return;
            }

            // 无贴图时的 fallback 绘制
            ctx.fillStyle = '#8d6e63';
            ctx.beginPath();
            // 身体
            ctx.ellipse(x, y, 35, 12, 0, 0, Math.PI * 2);
            // 驼峰
            ctx.ellipse(x - 5, y - 14, 10, 14, 0, 0, Math.PI * 2);
            // 脖子
            ctx.ellipse(x + 28, y - 18, 6, 18, -0.4, 0, Math.PI * 2);
            // 头
            ctx.ellipse(x + 40, y - 32, 9, 7, 0, 0, Math.PI * 2);
            ctx.fill();
            // 腿
            ctx.strokeStyle = '#8d6e63';
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(x - 20, y + 10); ctx.lineTo(x - 20, y + 32);
            ctx.moveTo(x - 5, y + 10); ctx.lineTo(x - 5, y + 32);
            ctx.moveTo(x + 10, y + 10); ctx.lineTo(x + 10, y + 32);
            ctx.moveTo(x + 25, y + 10); ctx.lineTo(x + 25, y + 32);
            ctx.stroke();
            ctx.restore();
        }

        function drawCactus(x, y, scale = 1) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);
            ctx.fillStyle = '#2e7d32';
            // 主干
            ctx.fillRect(-6, -40, 12, 45);
            // 分枝
            ctx.beginPath();
            ctx.moveTo(-6, -25);
            ctx.quadraticCurveTo(-22, -28, -22, -12);
            ctx.lineTo(-22, -5);
            ctx.quadraticCurveTo(-22, -18, -6, -15);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(6, -30);
            ctx.quadraticCurveTo(22, -33, 22, -17);
            ctx.lineTo(22, -10);
            ctx.quadraticCurveTo(22, -23, 6, -20);
            ctx.fill();
            ctx.restore();
        }

        // ===== 夜晚（原版风格） =====
        function drawNight() {
            const grad = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
            grad.addColorStop(0, '#0f3460');
            grad.addColorStop(0.6, '#16213e');
            grad.addColorStop(1, '#1a1a2e');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            drawStars();
            drawMoon(80, 70, 22);
            drawClouds(0.25);

            ctx.fillStyle = 'rgba(15, 52, 96, 0.5)';
            ctx.beginPath();
            ctx.moveTo(0, GROUND_Y);
            for (let x = 0; x <= GAME_WIDTH; x += 50) {
                ctx.lineTo(x, GROUND_Y - 30 - Math.sin(x * 0.02) * 20);
            }
            ctx.lineTo(GAME_WIDTH, GROUND_Y);
            ctx.closePath();
            ctx.fill();

            drawGround('#2d5016', '#3d6b1f', 20, 40);
        }

        // ===== 铁路 =====
        function drawRailway() {
            const grad = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
            grad.addColorStop(0, '#FF7F50');
            grad.addColorStop(0.4, '#F4A460');
            grad.addColorStop(1, '#2c3e50');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            drawSun(GAME_WIDTH - 70, 90, 35, '#ff5722');

            // 远山：更大、更平滑、缓慢向后移动
            drawRailwayMountains('#5d4037', 70, railwayMountainOffset, GROUND_Y - 30);
            drawRailwayMountains('#4e342e', 45, railwayMountainOffset, GROUND_Y - 10);

            // 火车（缩小并增加两节车厢）
            drawTrain(trainX, GROUND_Y - 90);

            // 铁轨枕木
            ctx.fillStyle = '#5d4037';
            groundOffset = (groundOffset + getCurrentMonsterSpeed()) % 35;
            for (let x = -groundOffset; x < GAME_WIDTH; x += 35) {
                ctx.fillRect(x, GROUND_Y - 8, 20, 10);
            }

            // 铁轨
            ctx.strokeStyle = '#90a4ae';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(0, GROUND_Y - 6);
            ctx.lineTo(GAME_WIDTH, GROUND_Y - 6);
            ctx.moveTo(0, GROUND_Y + 2);
            ctx.lineTo(GAME_WIDTH, GROUND_Y + 2);
            ctx.stroke();

            drawGround('#795548', '#8d6e63', 16, 40);
        }

        function drawRailwayMountains(color, amplitude, offset, yBase) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(0, GAME_HEIGHT);
            for (let x = 0; x <= GAME_WIDTH; x += 5) {
                const wx = x + offset;
                const y = yBase - Math.sin(wx * 0.002) * amplitude - Math.sin(wx * 0.005 + 2) * amplitude * 0.4;
                ctx.lineTo(x, y);
            }
            ctx.lineTo(GAME_WIDTH, GAME_HEIGHT);
            ctx.closePath();
            ctx.fill();
        }

        function drawTrain(x, y) {
            ctx.save();
            const scale = 0.7;
            ctx.translate(x, y);
            ctx.scale(scale, scale);

            // 火车向左→右开，车头在最右侧
            // 四节车厢在左
            ctx.fillStyle = '#455a64';
            for (let i = 0; i < 4; i++) {
                ctx.fillRect(i * 75, 5, 70, 50);
            }
            // 车头在最右侧
            ctx.fillStyle = '#37474f';
            ctx.fillRect(300, 0, 90, 55);
            // 烟囱（在车头前部上方）
            ctx.fillStyle = '#263238';
            ctx.fillRect(355, -18, 16, 18);

            // 窗户
            ctx.fillStyle = '#b3e5fc';
            for (let i = 0; i < 4; i++) {
                ctx.fillRect(5 + i * 75, 15, 20, 15);
                ctx.fillRect(35 + i * 75, 15, 20, 15);
            }
            ctx.fillRect(310, 10, 25, 18);
            ctx.fillRect(345, 10, 25, 18);

            // 车轮
            ctx.fillStyle = '#263238';
            const wheelXs = [];
            for (let i = 0; i < 4; i++) {
                wheelXs.push(20 + i * 75, 60 + i * 75);
            }
            wheelXs.push(320, 365);
            wheelXs.forEach(wx => {
                ctx.beginPath();
                ctx.arc(wx, 60, 8, 0, Math.PI * 2);
                ctx.fill();
            });

            // 烟雾（从车头烟囱冒出，向后方左侧飘散）
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.beginPath();
            ctx.arc(363, -35, 10, 0, Math.PI * 2);
            ctx.arc(345, -50, 14, 0, Math.PI * 2);
            ctx.arc(320, -65, 18, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        // ===== 大雨 =====
        function drawRain() {
            const grad = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
            grad.addColorStop(0, '#1a1a2e');
            grad.addColorStop(0.5, '#2c3e50');
            grad.addColorStop(1, '#1e3a28');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            // 闪电闪光
            if (lightningTimer > 0) {
                ctx.fillStyle = `rgba(255, 255, 255, ${lightningTimer / 20 * 0.6})`;
                ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            }

            drawClouds(0.4);

            // 雨滴
            ctx.strokeStyle = 'rgba(173, 216, 230, 0.6)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            rainDrops.forEach(drop => {
                ctx.moveTo(drop.x, drop.y);
                ctx.lineTo(drop.x - 3, drop.y + drop.len);
            });
            ctx.stroke();

            // 积水反光
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            groundOffset = (groundOffset + getCurrentMonsterSpeed()) % 80;
            for (let x = -groundOffset; x < GAME_WIDTH; x += 80) {
                ctx.beginPath();
                ctx.ellipse(x + 30, GROUND_Y + 25, 25, 5, 0, 0, Math.PI * 2);
                ctx.fill();
            }

            drawGround('#1e3a28', '#2e5a3a', 22, 40);
        }

        // ===== 碰撞检测工具 =====
        function rectsOverlap(a, b) {
            return a.x < b.x + b.width &&
                   a.x + a.width > b.x &&
                   a.y < b.y + b.height &&
                   a.y + a.height > b.y;
        }

        // ===== 击倒怪兽 =====
        function knockMonster(monster, direction = 1, silent = false) {
            if (!monster.scored) {
                monster.scored = true;
                passedMonsters++;
                score = passedMonsters;
                updateScoreDisplay();
            }
            monster.isKnocked = true;
            monster.knockEffect = Math.floor(Math.random() * 5);
            monster.knockFrame = 0;
            switch (monster.knockEffect) {
                case 0: // 经典击飞
                    monster.vx = 7 * direction;
                    monster.vy = -6;
                    monster.vRotation = 0.15;
                    break;
                case 1: // 高速旋转向上
                    monster.vx = 5 * direction;
                    monster.vy = -13;
                    monster.vRotation = 0.45;
                    break;
                case 2: // 猛撞右墙再掉落
                    monster.vx = 16 * direction;
                    monster.vy = -9;
                    monster.vRotation = 0.2;
                    break;
                case 3: // 直接右上飞出屏幕
                    monster.vx = 10 * direction;
                    monster.vy = -15;
                    monster.vRotation = 0.25;
                    break;
                case 4: // 向后猛摔
                    monster.vx = -10 * direction;
                    monster.vy = -12;
                    monster.vRotation = -0.35;
                    break;
            }
            if (!silent) playKnockSound();
        }

        function dropFootball() {
            // 足球掉落/丢失：停止倒计时，留在原地向后滚动消失
            player.footballTimer = 0;
            player.footballKicked = false;
        }

        function dropHammer() {
            // 锤子用完或超时：播放掉落动画并清除锤子状态
            if (player.hammerHits > 0 || player.invincibleTimer > 0) {
                const cx = player.x + player.width / 2;
                const cy = player.y + player.height / 2;
                const handX = 28;
                const rightHandY = player.height * 0.05 + (player.isJumping ? 5 : -Math.sin(frameCount * 0.2) * 3);
                droppingHammer = {
                    x: cx + handX,
                    y: cy + rightHandY,
                    vx: -3,
                    vy: -5,
                    rotation: 0,
                    vRotation: 0.25,
                    alpha: 1
                };
            }
            player.invincibleTimer = 0;
            player.hammerHits = 0;
        }

        // ===== 处理道具拾取 =====
        function collectItem(item) {
            if (item.type === 'skillbook') {
                player.skillBooks++;
            } else if (item.type === 'hammer') {
                player.invincibleTimer = getHammerDuration();
                player.hammerHits = getHammerHits();
                droppingHammer = null;
            } else if (item.type === 'wings') {
                // 带球时吃翅膀，足球从后方滚走丢失
                if (player.footballTimer > 0 && !player.footballKicked) {
                    dropFootball();
                }
                // 吉普车上吃翅膀无效
                if (player.jeepTimer <= 0) {
                    player.flyTimer = getWingsDuration();
                    player.vy = 0;
                }
            } else if (item.type === 'shield') {
                player.shieldTimer = getShieldDuration();
            } else if (item.type === 'stone') {
                projectiles.push(new StoneProjectile(player.x + player.width, player.y + player.height / 2));
            } else if (item.type === 'jeep') {
                if (player.jeepTimer > 0) {
                    // 已在车上，再吃到车补充 10+技能书 发弹药
                    player.jeepAmmo += 10 + player.skillBooks;
                } else {
                    player.jeepTimer = 1; // 标记处于吉普车状态
                    player.jeepAmmo = getJeepAmmo();
                }
                // 带球时上车：暂停足球计时，改为车载状态
                if (player.footballTimer > 0 && !player.footballKicked) {
                    player.footballPending = true;
                }
                player.flyTimer = 0;
            } else if (item.type === 'football') {
                if (player.jeepTimer > 0) {
                    // 在车上吃足球：暂存，下车后触发
                    player.footballPending = true;
                } else {
                    player.footballTimer = getFootballDuration();
                    player.footballKicked = false;
                    player.footballX = player.x + player.width + 10;
                    player.footballY = GROUND_Y - 18;
                }
            } else if (item.type === 'rocket') {
                const rocketCount = 1 + player.skillBooks;
                const maxArcHeight = 230; // 确保火箭全程不飞出屏幕顶部
                for (let i = 0; i < rocketCount; i++) {
                    const duration = ROCKET_FLIGHT_DURATION + i * 180; // 5s, 8s, 11s, ...
                    let targetX;
                    if (rocketCount === 1) {
                        targetX = GAME_WIDTH / 2;
                    } else {
                        targetX = GAME_WIDTH * (0.25 + 0.5 * i / (rocketCount - 1));
                    }
                    let arcHeight;
                    if (rocketCount === 1) {
                        arcHeight = 220;
                    } else {
                        arcHeight = 140 + (maxArcHeight - 140) * (i / (rocketCount - 1));
                    }
                    arcHeight = Math.min(arcHeight, maxArcHeight);
                    activeRockets.push(new Rocket(
                        player.x + player.width / 2,
                        player.y + player.height / 2,
                        targetX,
                        duration,
                        arcHeight
                    ));
                }
            }
            item.collected = true;
            playItemSound();
        }

        // ===== 更新道具状态显示 =====
        function updatePowerupDisplay() {
            powerupDisplay.innerHTML = '';
            // 技能书图标逐个显示在同一行，无文字
            if (player.skillBooks > 0) {
                const icons = '📖'.repeat(player.skillBooks);
                powerupDisplay.innerHTML += `<div class="powerup-tag" style="color:#d2b4de">${icons}</div>`;
            }
            if (player.invincibleTimer > 0) {
                const seconds = Math.ceil(player.invincibleTimer / 60);
                powerupDisplay.innerHTML += `<div class="powerup-tag hammer">🔨 锤子 ${player.hammerHits}下/${seconds}s</div>`;
            }
            if (player.flyTimer > 0) {
                const seconds = Math.ceil(player.flyTimer / 60);
                powerupDisplay.innerHTML += `<div class="powerup-tag wings">🪽 飞行 ${seconds}s</div>`;
            }
            if (player.shieldTimer > 0) {
                const seconds = Math.ceil(player.shieldTimer / 60);
                powerupDisplay.innerHTML += `<div class="powerup-tag shield">🛡️ 盾牌 ${seconds}s</div>`;
            }
            if (player.jeepTimer > 0) {
                powerupDisplay.innerHTML += `<div class="powerup-tag" style="color:#2ecc71">🚙 吉普车 ${player.jeepAmmo}发</div>`;
            }
            if (player.footballTimer > 0) {
                const seconds = Math.ceil(player.footballTimer / 60);
                powerupDisplay.innerHTML += `<div class="powerup-tag" style="color:#fff">⚽ 足球 ${seconds}s</div>`;
            }
        }

        // ===== 碰撞检测主逻辑 =====
        function checkCollisions() {
            // 吉普车状态下使用吉普车的实际碰撞箱
            const playerHitbox = player.jeepTimer > 0 ? {
                x: player.x + player.width / 2 - 55,
                y: GROUND_Y - 78 + 4,
                width: 110,
                height: 78
            } : {
                x: player.x + COLLISION_MARGIN_X,
                y: player.y + COLLISION_MARGIN_Y,
                width: player.width - COLLISION_MARGIN_X * 2,
                height: player.height - COLLISION_MARGIN_Y * 2
            };

            // 道具拾取
            for (const item of items) {
                if (!item.collected && rectsOverlap(playerHitbox, item.getHitbox())) {
                    collectItem(item);
                }
            }

            // 足球带球/滞留期间：足球本身碰撞怪兽
            if (!player.footballKicked && player.footballX + 60 > 0) {
                const ballHitbox = {
                    x: player.footballX + 8,
                    y: player.footballY + 8,
                    width: 40,
                    height: 40
                };
                for (const monster of monsters) {
                    if (monster.isKnocked) continue;
                    if (rectsOverlap(ballHitbox, monster.getHitbox())) {
                        knockMonster(monster, 1);
                        // 带球足球可以一次清除上下重叠的怪兽
                        if (monster.stackPartner) {
                            knockMonster(monster.stackPartner, 1);
                        }
                    }
                }
            }

            // 怪兽碰撞
            for (const monster of monsters) {
                if (monster.isKnocked) continue;

                // 飞行翅膀可以完整越过上下重叠的怪兽
                if (monster.stackRole && player.flyTimer > 0) continue;

                // 飞行怪兽只在玩家跳起或飞行时才能碰撞（吉普车体积大，也会被撞到）
                if (monster.type === 'flying') {
                    const playerOnGround = !player.isJumping && player.flyTimer <= 0 && player.y >= GROUND_Y - PLAYER_HEIGHT + GROUND_Y_OFFSET - 2;
                    if (playerOnGround && player.jeepTimer <= 0) continue;
                }

                if (rectsOverlap(playerHitbox, monster.getHitbox())) {
                    if (player.invincibleTimer > 0) {
                        knockMonster(monster, 1);
                        player.hammerHits--;
                        if (player.hammerHits <= 0) {
                            dropHammer();
                        }
                    } else if (player.jeepTimer > 0) {
                        // 吉普车被撞飞，怪兽也被撞飞，人活着
                        knockMonster(monster, 1);
                        flyingJeep = {
                            x: player.x - 20,
                            y: player.y,
                            width: 110,
                            height: 70,
                            vx: -8,
                            vy: -10,
                            rotation: 0,
                            vRotation: -0.15,
                            alpha: 1
                        };
                        player.jeepTimer = 0;
                        player.jeepAmmo = 0;
                        player.invincibleTimer = 90; // 1.5秒短暂无敌，避免立即再中
                        playKnockSound();
                    } else if (player.shieldTimer > 0) {
                        knockMonster(monster, 1);
                        player.shieldTimer = 0;
                    } else {
                        startDeath();
                        return;
                    }
                }
            }

            // 石块/吉普车子弹/导弹/足球踢出 击飞怪兽
            for (const projectile of projectiles) {
                if (projectile.hit || projectile.dying) continue;
                for (const monster of monsters) {
                    if (monster.isKnocked) continue;
                    const typeOk = projectile instanceof StoneProjectile ||
                                   projectile instanceof JeepBullet ||
                                   projectile instanceof JeepMissile ||
                                   projectile instanceof FootballKick;
                    if (!typeOk) continue;
                    // 吉普车子弹只打地面怪兽，导弹只打飞行怪兽
                    if (projectile instanceof JeepBullet && monster.type === 'flying') continue;
                    if (projectile instanceof JeepMissile && monster.type !== 'flying') continue;
                    if (rectsOverlap(projectile.getHitbox(), monster.getHitbox())) {
                        knockMonster(monster, 1);
                        // 足球踢出可以一次清除上下重叠的怪兽
                        if (projectile instanceof FootballKick && monster.stackPartner) {
                            knockMonster(monster.stackPartner, 1);
                        }
                        if (projectile instanceof FootballKick) {
                            // 足球踢出后贯穿怪兽，不消失
                        } else if (projectile instanceof StoneProjectile) {
                            // 石块贯穿怪兽，不消失，继续检测下一个怪兽
                        } else if (projectile instanceof JeepBullet) {
                            projectile.onHit();
                        } else {
                            projectile.hit = true;
                        }
                        if (!(projectile instanceof StoneProjectile)) {
                            break;
                        }
                    }
                }
            }
        }

        function startDeath() {
            player.isDead = true;
            player.vy = 0;
        }

        // ===== 计分逻辑 =====
        function updateScore() {
            for (const monster of monsters) {
                if (!monster.scored && monster.x + monster.width < player.x) {
                    monster.scored = true;
                    passedMonsters++;
                    score = passedMonsters;
                    updateScoreDisplay();
                }
            }
        }

        // ===== 清理离屏对象 =====
        function cleanupObjects() {
            monsters = monsters.filter(m => m.x + m.width > -100 && m.y < GAME_HEIGHT + 100);
            items = items.filter(i => i.x + i.width > -50 && !i.collected);
            projectiles = projectiles.filter(p => !p.hit && p.x < GAME_WIDTH + 100 && p.x + p.width > -100);

            // 性能保护：限制同屏最大数量，防止老设备卡顿
            const MAX_MONSTERS = 8;
            const MAX_ITEMS = 3;
            const MAX_PROJECTILES = 8;
            if (monsters.length > MAX_MONSTERS) {
                monsters.sort((a, b) => a.x - b.x);
                monsters = monsters.slice(0, MAX_MONSTERS);
            }
            if (items.length > MAX_ITEMS) {
                items.sort((a, b) => a.x - b.x);
                items = items.slice(0, MAX_ITEMS);
            }
            if (projectiles.length > MAX_PROJECTILES) {
                projectiles = projectiles.slice(-MAX_PROJECTILES);
            }
        }

        // ===== 更新背景动画 =====
        function updateBackground() {
            clouds.forEach(cloud => {
                cloud.x -= cloud.speed;
                if (cloud.x + cloud.width < 0) {
                    cloud.x = GAME_WIDTH + cloud.width;
                    cloud.y = Math.random() * 150 + 20;
                }
            });
        }

        // ===== 游戏主循环 =====
       function gameLoop() {
           if (gameState !== 'playing') return;
            try {

            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            updateBackground();
            updateScene();
            drawBackground();

            updatePlayer();
            drawPlayer();

            // 生成怪兽
            spawnTimer++;
            if (spawnTimer >= nextSpawnTime) {
                spawnMonster();
            }

            // 生成道具
            itemSpawnTimer++;
            if (itemSpawnTimer >= nextItemSpawnTime) {
                spawnItem();
            }

            // 生成技能书（独立计时器，30-50秒）
            skillBookSpawnTimer++;
            if (skillBookSpawnTimer >= nextSkillBookSpawnTime) {
                items.push(new Item('skillbook', GAME_WIDTH + 50));
                skillBookSpawnTimer = 0;
                nextSkillBookSpawnTime = 30 * 60 + Math.floor(Math.random() * 20 * 60);
            }

            // 生成飞行怪兽
            flyingSpawnTimer++;
            if (flyingSpawnTimer >= nextFlyingSpawnTime) {
                spawnFlyingMonster();
            }

            // 更新和绘制怪兽
            monsters.forEach(monster => {
                monster.update();
                monster.draw(ctx);
            });

            // 更新和绘制道具
            items.forEach(item => {
                item.update();
                item.draw(ctx);
            });

            // 更新和绘制石块
            projectiles.forEach(projectile => {
                projectile.update();
                projectile.draw(ctx);
            });

            // 更新和绘制火箭
            for (let i = activeRockets.length - 1; i >= 0; i--) {
                const rocket = activeRockets[i];
                rocket.update();
                rocket.draw(ctx);
                if (rocket.exploded) {
                    activeRockets.splice(i, 1);
                }
            }

            // 更新和绘制爆炸效果
            if (activeExplosion) {
                activeExplosion.update();
                activeExplosion.draw(ctx);
                if (activeExplosion.isFinished()) activeExplosion = null;
            }

            // 更新和绘制被撞飞的吉普车
            if (flyingJeep) {
                flyingJeep.x += flyingJeep.vx;
                flyingJeep.y += flyingJeep.vy;
                flyingJeep.vy += 0.5;
                flyingJeep.rotation += flyingJeep.vRotation;
                flyingJeep.alpha -= 0.02;
                if (flyingJeep.alpha <= 0 || flyingJeep.y > GAME_HEIGHT + 100) {
                    flyingJeep = null;
                } else {
                    ctx.save();
                    ctx.globalAlpha = flyingJeep.alpha;
                    ctx.translate(flyingJeep.x + flyingJeep.width / 2, flyingJeep.y + flyingJeep.height / 2);
                    ctx.rotate(flyingJeep.rotation);
                    if (jeepImg.complete && jeepImg.naturalWidth > 0) {
                        ctx.drawImage(jeepImg, -flyingJeep.width / 2, -flyingJeep.height / 2, flyingJeep.width, flyingJeep.height);
                    } else {
                        ctx.fillStyle = '#2ecc71';
                        ctx.fillRect(-flyingJeep.width / 2, -flyingJeep.height / 2, flyingJeep.width, flyingJeep.height);
                    }
                    ctx.restore();
                }
            }

            // 更新和绘制掉落的锤子
            if (droppingHammer) {
                droppingHammer.x += droppingHammer.vx;
                droppingHammer.y += droppingHammer.vy;
                droppingHammer.vy += 0.5;
                droppingHammer.rotation += droppingHammer.vRotation;
                droppingHammer.alpha -= 0.03;
                if (droppingHammer.alpha <= 0 || droppingHammer.y > GAME_HEIGHT + 50) {
                    droppingHammer = null;
                } else {
                    ctx.save();
                    ctx.globalAlpha = droppingHammer.alpha;
                    ctx.translate(droppingHammer.x, droppingHammer.y);
                    ctx.rotate(droppingHammer.rotation);

                    // 锤柄
                    ctx.fillStyle = '#8b4513';
                    ctx.beginPath();
                    ctx.roundRect(-3, -18, 6, 32, 2);
                    ctx.fill();

                    // 锤头
                    ctx.fillStyle = '#7f8c8d';
                    ctx.beginPath();
                    ctx.roundRect(-12, -28, 24, 12, 3);
                    ctx.fill();

                    // 锤头高光
                    ctx.fillStyle = '#95a5a6';
                    ctx.beginPath();
                    ctx.roundRect(-10, -26, 6, 4, 1);
                    ctx.fill();

                    ctx.restore();
                }
            }

            checkCollisions();
            updateScore();
            updatePowerupDisplay();
            cleanupObjects();

           frameCount++;
           requestAnimationFrame(gameLoop);
           } catch (e) {
               console.error('游戏循环异常:', e);
                // 显示错误信息到画布
               ctx.fillStyle = '#ff0000';
                ctx.font = '14px monospace';
                ctx.fillText('错误: ' + e.message, 10, 20);
                ctx.fillText('错误位置: ' + e.stack.split('\n')[1].trim(), 10, 40);
                ctx.fillText('游戏已暂停，查看控制台获取详细信息', 10, 60);
                // 重置为安全状态
                gameState = 'gameover';
                monsters = [];
                items = [];
                projectiles = [];
                flyingJeep = null;
                droppingHammer = null;
                activeRockets = [];
                activeExplosion = null;
                stopBGM();
            }
        }

        // ===== 开始游戏 =====
        function startGame() {
            gameState = 'playing';
            score = 0;
            passedMonsters = 0;
            frameCount = 0;
            spawnTimer = 0;
            nextSpawnTime = SPAWN_INTERVAL_MIN;
            itemSpawnTimer = 0;
            nextItemSpawnTime = getNextItemSpawnTime();
            skillBookSpawnTimer = 0;
            nextSkillBookSpawnTime = 30 * 60 + Math.floor(Math.random() * 20 * 60);
            flyingSpawnTimer = 0;
            nextFlyingSpawnTime = FLYING_MONSTER_SPAWN_MIN + Math.random() * (FLYING_MONSTER_SPAWN_MAX - FLYING_MONSTER_SPAWN_MIN);
            monsters = [];
            items = [];
            projectiles = [];
            flyingJeep = null;
            droppingHammer = null;
            activeRockets = [];
            activeExplosion = null;

            // 初始化场景系统
            currentScene = 'night';
            sceneTimer = 0;
            nextSceneTime = SCENE_SWITCH_MIN + Math.random() * (SCENE_SWITCH_MAX - SCENE_SWITCH_MIN);
            rainDrops = [];
            lightningTimer = 0;
            cityBuildings = [];
            cityLaneOffset = 0;
            desertCamelX = 0;
            desertCacti = [];
            grasslandHillOffset = 0;
            grasslandSheep = [];
            trainX = -300;
            railwayMountainOffset = 0;

            player.y = GROUND_Y - PLAYER_HEIGHT + GROUND_Y_OFFSET;
            player.vy = 0;
            player.isJumping = false;
            player.jumpCount = 0;
            player.invincibleTimer = 0;
            player.hammerHits = 0;
            player.flyTimer = 0;
            player.shieldTimer = 0;
            player.jeepTimer = 0;
            player.jeepAmmo = 0;
            player.footballTimer = 0;
            player.footballKicked = false;
            player.footballPending = false;

            player.isDead = false;

           initBackground();
            // 如果用户已开启音乐按钮，启动背景音乐
            if (document.getElementById('musicBtn').classList.contains('on')) startBGM();

        }

        // ===== 游戏结束 =====
        function gameOver() {
            gameState = 'gameover';
            playGameOverSound();

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('monsterJumpHighScore', highScore);
            }

            finalScoreEl.textContent = score;
            highScoreEl.textContent = highScore;
           gameOverScreen.style.display = 'flex';
            // 停止背景音乐
            stopBGM();
        }

        // ===== 加载最高分 =====
       function loadHighScore() {
           const saved = localStorage.getItem('monsterJumpHighScore');
           if (saved) {
               highScore = parseInt(saved, 10);
           }
       }
        // ============================================
        //  BGM 系统 — 8-bit 程序化背景音乐
        // ============================================

        const BGM_NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
        function bgmNoteToFreq(note) {
            if (!note || note === '-') return 0;
            const m = note.match(/^([A-G]#?)(\d+)$/);
            if (!m) return 0;
            const semitone = BGM_NOTE_NAMES.indexOf(m[1]);
            const octave = parseInt(m[2], 10);
            return 440 * Math.pow(2, (semitone - 9 + (octave - 4) * 12) / 12);
        }

        function bgmPlayOsc(oscType, freq, duration, startTime, gainValue, detuneCents) {
            if (freq <= 0 || !bgmMasterGain) return;
            const osc = bgmAudioCtx.createOscillator();
            const gain = bgmAudioCtx.createGain();
            osc.type = oscType;
            osc.frequency.value = freq;
            if (detuneCents) osc.detune.value = detuneCents;
            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(gainValue, startTime + 0.008);
            gain.gain.setValueAtTime(gainValue, startTime + duration - 0.04);
            gain.gain.linearRampToValueAtTime(0, startTime + duration);
            osc.connect(gain);
            gain.connect(bgmMasterGain);
            osc.start(startTime);
            osc.stop(startTime + duration);
        }

        function bgmEnsureDrumBuffers() {
            if (!bgmAudioCtx || bgmDrumBuffers.kick) return;
            const sampleRate = bgmAudioCtx.sampleRate;
            function makeBuffer(duration, fn) {
                const bufferSize = Math.ceil(sampleRate * duration);
                const buffer = bgmAudioCtx.createBuffer(1, bufferSize, sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = fn(i / sampleRate);
                }
                return buffer;
            }
            bgmDrumBuffers.kick = makeBuffer(0.5, t => Math.sin(2 * Math.PI * Math.max(120 - t * 400, 30) * t) * Math.max(0, 1 - t * 8));
            bgmDrumBuffers.snare = makeBuffer(0.5, t => (Math.random() * 2 - 1) * Math.max(0, 1 - t * 5));
            bgmDrumBuffers.hihat = makeBuffer(0.3, t => (Math.random() * 2 - 1) * Math.max(0, 1 - t * 15));
        }

        function bgmPlayDrum(type, startTime, duration) {
            if (!bgmMasterGain || !bgmDrumBuffers[type]) return;
            const source = bgmAudioCtx.createBufferSource();
            source.buffer = bgmDrumBuffers[type];
            const gain = bgmAudioCtx.createGain();
            gain.gain.setValueAtTime(1, startTime);
            gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
            source.connect(gain);
            gain.connect(bgmMasterGain);
            source.start(startTime);
            source.stop(startTime + duration);
        }

        function bgmScheduleMelody(startTime, bpm) {
            const beat = 60 / bpm;
            const mA = [
                ['E4',0.75],['G4',0.25],['C5',0.5],['D5',0.5],
                ['E5',1],['D5',0.5],['C5',0.5],
                ['B4',0.75],['C5',0.25],['D5',0.5],['E5',0.5],
                ['D5',1.5],['-',0.5],
                ['C5',0.5],['E5',0.5],['G5',0.5],['E5',0.5],
                ['D5',0.5],['C5',0.5],['B4',0.5],['G4',0.5],
                ['C5',1],['E5',1],['D5',1.5],['-',0.5],
            ];
            const mB = [
                ['A4',0.5],['C5',0.5],['E5',0.75],['D5',0.25],
                ['C5',0.5],['B4',0.5],['A4',0.5],['-',0.5],
                ['F4',0.75],['A4',0.25],['C5',0.5],['E5',0.5],
                ['D5',1],['C5',1],
                ['G4',0.5],['B4',0.5],['D5',0.5],['G5',0.5],
                ['E5',0.5],['D5',0.5],['C5',1],
                ['F5',0.5],['E5',0.5],['D5',0.5],['C5',0.5],
                ['B4',1],['G4',1],
            ];
            const mA2 = [
                ['E4',0.75],['G4',0.25],['C5',0.5],['D5',0.5],
                ['E5',1],['D5',0.5],['C5',0.5],
                ['B4',0.75],['C5',0.25],['D5',0.5],['E5',0.5],
                ['D5',1.5],['-',0.5],
                ['C5',0.5],['E5',0.5],['G5',0.5],['E5',0.5],
                ['D5',0.5],['C5',0.5],['B4',0.5],['G4',0.5],
                ['C5',1],['E5',1],['C5',1.5],['-',0.5],
            ];
            const allNotes = [...mA, ...mB, ...mA2];
            let t = 0;
            for (const [note, beats] of allNotes) {
                const freq = bgmNoteToFreq(note);
                const dur = beats * beat * 0.95;
                bgmPlayOsc('square', freq, dur, startTime + t * beat, 0.035);
                t += beats;
            }
        }

        function bgmScheduleBass(startTime, bpm) {
            const beat = 60 / bpm;
            const notes = [
                ['C3',2],['G2',2],['A2',2],['E2',2],
                ['F2',2],['C3',2],['G2',1.5],['G2',0.5],
                ['C3',2],['G2',2],['A2',2],['E2',2],
                ['F2',2],['C3',2],['G2',1.5],['G2',0.5],
                ['F2',2],['C3',2],['G2',2],['A2',2],
                ['F2',2],['G2',2],['C3',2],['C3',2],
                ['C3',2],['G2',2],['A2',2],['E2',2],
                ['F2',2],['C3',2],['G2',1.5],['G2',0.5],
            ];
            let t = 0;
            for (const [note, beats] of notes) {
                const freq = bgmNoteToFreq(note);
                const dur = beats * beat * 0.98;
                bgmPlayOsc('triangle', freq, dur, startTime + t * beat, 0.06);
                t += beats;
            }
        }

        function bgmScheduleDrums(startTime, bpm) {
            const beat = 60 / bpm;
            for (let i = 0; i < 96; i++) {
                const t = startTime + i * beat;
                if (i % 4 === 0) bgmPlayDrum('kick', t, beat * 0.12);
                if (i % 4 === 1 || i % 4 === 3) bgmPlayDrum('snare', t, beat * 0.1);
                if (i % 2 === 1) bgmPlayDrum('hihat', t, beat * 0.06);
            }
        }

        function bgmSchedulePad(startTime, bpm) {
            const beat = 60 / bpm;
            const chords = [
                ['C3','E3','G3'],['G2','B2','D3'],
                ['A2','C3','E3'],['E2','G2','B2'],
                ['F2','A2','C3'],['C3','E3','G3'],
                ['G2','B2','D3'],['G2','B2','D3'],
            ];
            const repeat = [...chords,...chords,...chords,...chords];
            let t = 0;
            for (const chord of repeat) {
                const dur = 4 * beat * 0.98;
                for (const nn of chord.slice(0, 2)) {
                    bgmPlayOsc('sawtooth', bgmNoteToFreq(nn), dur, startTime + t * beat, 0.01, Math.random()*5-2.5);
                }
                t += 4;
            }
        }

        function bgmStopAll() {
            if (bgmTimer) { clearTimeout(bgmTimer); bgmTimer = null; }
            if (bgmMasterGain) {
                try {
                    bgmMasterGain.gain.setValueAtTime(0, bgmAudioCtx.currentTime);
                    bgmMasterGain.disconnect();
                } catch (e) {}
                bgmMasterGain = null;
            }
            bgmScheduledNodes = [];
            bgmIsPlaying = false;
        }

        function getBgmBPM() {
            const level = Math.floor(score / 10);
            return Math.min(130 + level * 3, 175);
        }

        function startBGM() {
            if (!bgmEnabled) return;
            bgmStopAll();
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (!bgmAudioCtx) bgmAudioCtx = audioCtx;
            bgmEnsureDrumBuffers();
            bgmMasterGain = bgmAudioCtx.createGain();
            bgmMasterGain.gain.value = 0.45;
            bgmMasterGain.connect(bgmAudioCtx.destination);
            bgmIsPlaying = true;
            bgmActive = true;
            const bpm = getBgmBPM();
            const now = bgmAudioCtx.currentTime;
            bgmScheduleMelody(now + 0.1, bpm);
            bgmScheduleBass(now + 0.1, bpm);
            bgmScheduleDrums(now + 0.1, bpm);
            bgmSchedulePad(now + 0.1, bpm);
            const totalDuration = (24 * 4 / bpm) * 60 + 0.5;
            bgmTimer = setTimeout(() => {
                if (bgmIsPlaying && bgmActive) startBGM();
            }, totalDuration * 1000 - 200);
        }

        function stopBGM() {
            bgmActive = false;
            bgmStopAll();
        }

       function toggleBGM() {
            const btn = document.getElementById('musicBtn');
            if (btn.classList.contains('on')) {
                btn.classList.remove('on');
                stopBGM();
                bgmEnabled = false;
            } else {
                btn.classList.add('on');
                bgmEnabled = true;
                if (gameState === 'playing') startBGM();
            }
        }

        function toggleWindowFullscreen() {
            gameContainer.classList.toggle('window-fullscreen');
            fullscreenBtn.textContent = gameContainer.classList.contains('window-fullscreen') ? '⛶' : '⛶';
            fullscreenBtn.title = gameContainer.classList.contains('window-fullscreen') ? '退出全屏' : '网页全屏';
        }

        function enterWindowFullscreen() {
            gameContainer.classList.add('window-fullscreen');
            fullscreenBtn.title = '退出全屏';
        }

        // ===== 事件监听 =====
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();

                if (gameState === 'start') {
                    startGame();
                } else if (gameState === 'playing') {
                    jump();
                } else if (gameState === 'gameover') {
                    startGame();
                }
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameState === 'playing') {
                jump();
            } else if (gameState === 'start' || gameState === 'gameover') {
                startGame();
            }
        });

        canvas.addEventListener('mousedown', (e) => {
            if (gameState === 'playing') {
                jump();
            }
        });

        startBtn.addEventListener('click', startGame);
       restartBtn.addEventListener('click', startGame);
        document.getElementById('musicBtn').addEventListener('click', toggleBGM);
        fullscreenBtn.addEventListener('click', toggleWindowFullscreen);

        // ===== 初始化 =====
        loadHighScore();
        initBackground();
        drawBackground();
        drawPlayer();

        console.log('🎮 跳怪兽小游戏已加载！按空格键开始游戏');
    </script>
